<script>
// ============================================================
//  CONVEYOR CLASH: Mechs & Logistics — Complete Game v2
// ============================================================

'use strict';

// ==================== CONSTANTS ====================
const CELL = 40;
const COLS = 40;
const ROWS = 22;
const W = COLS * CELL;      // 1600
const H = ROWS * CELL + 20; // 900

// Mech physics
const MECH_R = 16;
const MECH_ACCEL = 1600;
const MECH_FRICTION = 0.88;
const MECH_MAX_SPEED = 260;
const MECH_HP = 120;

// Dash
const DASH_SPEED = 650;
const DASH_DUR = 0.2;
const DASH_CD = 1.4;
const DASH_DMG = 18;

// Shoot
const BULLET_SPEED = 480;
const BULLET_DMG = 10;
const BULLET_COST = 4;
const BULLET_LIFE = 2.2;
const SHOOT_CD = 0.2;

// Melee Piledriver
const MELEE_DMG_MECH = 28;
const MELEE_DMG_BUILD = 9999;
const MELEE_RANGE = 52;
const MELEE_HALF_W = 18;
const MELEE_KB = 520;
const MELEE_DUR = 0.28;
const MELEE_CD = 0.75;

// Parry Shield
const PARRY_ARC = Math.PI * 0.6;  // 108 degrees
const PARRY_DIST = 32;

// Building costs & stats
const CONV_COST = 3;
const WALL_COST = 5;
const TURR_COST = 16;
const WALL_HP = 120;
const TURR_HP = 70;
const TURR_RANGE = 240;
const TURR_DMG = 9;
const TURR_FIRE_RATE = 0.85;
const TURR_ENERGY_COST = 2;

// Energy
const START_ENERGY = 50;
const NODE_RATE = 3.5;
const MAX_ENERGY = 350;

// Core
const CORE_SIZE = 70;
const CORE_HP = 600;

// Player color palettes
const P_COL  = ['#0ff','#08f'];
const P_DIM  = ['#066','#044'];
const P_GLOW = ['rgba(0,255,255,0.25)','rgba(0,120,255,0.25)'];
const P_BG   = ['#0a3a3a','#0a1a3a'];
const P_BLDG = ['#1a4a4a','#1a2a4a'];
const E_COL  = ['#f60','#f30'];
const E_DIM  = ['#630','#420'];
const E_GLOW = ['rgba(255,100,0,0.25)','rgba(255,50,0,0.25)'];
const E_BG   = ['#3a1a0a','#3a0a0a'];
const E_BLDG = ['#4a2a1a','#4a1a1a'];

// Resource node grid positions
const NODE_POS = [
  {gx:12, gy:4},  {gx:19, gy:11}, {gx:12, gy:17},
  {gx:27, gy:4},  {gx:27, gy:17}
];

// Core pixel centers
const CORE_CTR = [{x:120,y:440},{x:1480,y:440}];
// Mech spawn points
const SPAWN    = [{x:220,y:440},{x:1380,y:440}];

// ==================== CANVAS SETUP ====================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = W;
canvas.height = H;

// ==================== GLOBALS ====================
let peer = null, conn = null;
let isHost = false, myIndex = 0;
let gameState = null;
let lastTime = 0, accumulator = 0;
const TICK = 1/30;
let animTime = 0;
let practiceMode = false;
let aiInput = null;
let aiTimer = 0;

// Input
const keys = {};
let mouseX = W/2, mouseY = H/2;
let mouseLeftDown = false, mouseRightDown = false;
let mouseLeftClicked = false, mouseRightClicked = false;
let buildMode = 0;

// Remote
let remoteInput = null;

// ==================== UTILITY ====================
function clamp(v,lo,hi){return v<lo?lo:v>hi?hi:v}
function rng(a,b){return a+Math.random()*(b-a)}
function rngInt(a,b){return Math.floor(rng(a,b+1))}
function normAngle(a){while(a>Math.PI)a-=2*Math.PI;while(a<-Math.PI)a+=2*Math.PI;return a}
function gridCtr(gx,gy){return{x:gx*CELL+CELL/2,y:gy*CELL+CELL/2}}
function toGrid(px,py){return{gx:Math.floor(px/CELL),gy:Math.floor(py/CELL)}}

function rectCircle(rx,ry,rw,rh,cx,cy,cr){
  const nx=clamp(cx,rx,rx+rw),ny=clamp(cy,ry,ry+rh);
  return Math.hypot(cx-nx,cy-ny)<cr;
}
function circleCircle(x1,y1,r1,x2,y2,r2){
  return Math.hypot(x1-x2,y1-y2)<r1+r2;
}

// Point in arc sector
function pointInArc(px,py,cx,cy,facing,arcHalf,dist){
  const dx=px-cx,dy=py-cy;
  const d=Math.hypot(dx,dy);
  if(d>dist)return false;
  const ang=Math.atan2(dy,dx);
  return Math.abs(normAngle(ang-facing))<arcHalf;
}

// ==================== GAME STATE ====================
function createGameState(){
  return {
    phase:'countdown', countdown:3.5, time:0, winner:-1,
    mechs:[
      makeMech(0), makeMech(1)
    ],
    cores:[
      {x:CORE_CTR[0].x,y:CORE_CTR[0].y,hp:CORE_HP,maxHp:CORE_HP},
      {x:CORE_CTR[1].x,y:CORE_CTR[1].y,hp:CORE_HP,maxHp:CORE_HP}
    ],
    energy:[START_ENERGY,START_ENERGY],
    connectedNodes:[0,0],
    buildings:[],
    bullets:[],
    tBullets:[],
    nodes:NODE_POS.map(n=>({gx:n.gx,gy:n.gy,owner:-1})),
    particles:[],
    meleeHitP1:false, meleeHitP2:false
  };
}

function makeMech(p){
  return{
    x:SPAWN[p].x, y:SPAWN[p].y, vx:0, vy:0,
    hp:MECH_HP, maxHp:MECH_HP,
    facing:p===0?0:Math.PI,
    dashing:false, dashTimer:0, dashCd:0, dashDx:0, dashDy:0,
    parrying:false,
    meleeing:false, meleeTimer:0, meleeCd:0,
    shootCd:0, invTimer:0,
    respawnTimer:0, dead:false
  };
}

// ==================== ENERGY FLOW (BFS) ====================
function computeEnergy(gs){
  const cn=[0,0];
  for(let p=0;p<2;p++){
    const visited=new Set();
    const queue=[];
    // Start from core cells
    const cc=toGrid(gs.cores[p].x,gs.cores[p].y);
    for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){
      const k=(cc.gx+dx)+','+(cc.gy+dy);
      if(!visited.has(k)){visited.add(k);queue.push({gx:cc.gx+dx,gy:cc.gy+dy})}
    }
    // BFS through conveyors
    const myConv=gs.buildings.filter(b=>b.owner===p&&b.type==='conveyor');
    let head=0;
    while(head<queue.length){
      const{gx,gy}=queue[head++];
      for(const b of myConv){
        const k=b.gx+','+b.gy;
        if(!visited.has(k)&&Math.abs(b.gx-gx)+Math.abs(b.gy-gy)<=1){
          visited.add(k);queue.push({gx:b.gx,gy:b.gy});
        }
      }
    }
    // Mark connectivity
    for(const b of gs.buildings){
      if(b.owner===p&&b.type==='conveyor'){
        b.connected=visited.has(b.gx+','+b.gy);
      }
    }
    // Determine node ownership
    for(const n of gs.nodes){
      let adjP=false, adjE=false;
      for(const b of gs.buildings){
        if(b.type!=='conveyor'||!b.connected)continue;
        if(Math.abs(b.gx-n.gx)+Math.abs(b.gy-n.gy)<=1){
          if(b.owner===p)adjP=true; else adjE=true;
        }
      }
      // Direct core adjacency (close nodes)
      if(Math.abs(n.gx-cc.gx)+Math.abs(n.gy-cc.gy)<=2)adjP=true;
      const occ=toGrid(gs.cores[1-p].x,gs.cores[1-p].y);
      if(Math.abs(n.gx-occ.gx)+Math.abs(n.gy-occ.gy)<=2)adjE=true;

      if(adjP&&!adjE){n.owner=p;cn[p]++}
      else if(!adjP&&adjE){n.owner=1-p;cn[1-p]++}
      else if(adjP&&adjE){n.owner=-1}// contested
      // else neutral, no change
    }
  }
  gs.connectedNodes=cn;
}

// ==================== INPUT CAPTURE ====================
document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k===' '||k==='space'){e.preventDefault();keys.space=true}
  else if(k==='q')keys.q=true;
  else keys[k]=true;

  if(e.key==='1'){buildMode=buildMode===1?0:1;e.preventDefault()}
  if(e.key==='2'){buildMode=buildMode===2?0:2;e.preventDefault()}
  if(e.key==='3'){buildMode=buildMode===3?0:3;e.preventDefault()}
  if(e.key==='Escape')buildMode=0;
});
document.addEventListener('keyup',e=>{
  const k=e.key.toLowerCase();
  if(k===' '||k==='space')keys.space=false;
  else if(k==='q')keys.q=false;
  else keys[k]=false;
});

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouseX=(e.clientX-r.left)*(W/r.width);
  mouseY=(e.clientY-r.top)*(H/r.height);
});
canvas.addEventListener('mousedown',e=>{
  e.preventDefault();
  if(e.button===0){mouseLeftDown=true;mouseLeftClicked=true}
  if(e.button===2){mouseRightDown=true;mouseRightClicked=true}
});
canvas.addEventListener('mouseup',e=>{
  if(e.button===0)mouseLeftDown=false;
  if(e.button===2)mouseRightDown=false;
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());

function captureInput(){
  const inp={
    w:!!keys.w, a:!!keys.a, s:!!keys.s, d:!!keys.d,
    space:!!keys.space, q:!!keys.q,
    mx:mouseX, my:mouseY,
    lmb:mouseLeftClicked, rmb:mouseRightClicked,
    buildMode:buildMode
  };
  mouseLeftClicked=false;
  mouseRightClicked=false;
  return inp;
}

// ==================== AI FOR PRACTICE ====================
function getAIInput(gs,p){
  const m=gs.mechs[p];
  const em=gs.mechs[1-p];
  const eco=gs.cores[1-p];
  const inp={w:false,a:false,s:false,d:false,space:false,q:false,
    mx:eco.x,my:eco.y,lmb:false,rmb:false,buildMode:0};
  if(m.dead)return inp;

  // Aim at enemy
  inp.mx=em.x+rng(-30,30);
  inp.my=em.y+rng(-30,30);

  // Move toward enemy if far
  const dEnemy=Math.hypot(m.x-em.x,m.y-em.y);
  const angToE=Math.atan2(em.y-m.y,em.x-m.x);
  if(dEnemy>200){
    if(Math.cos(angToE)>0.3)inp.d=true;
    if(Math.cos(angToE)<-0.3)inp.a=true;
    if(Math.sin(angToE)>0.3)inp.s=true;
    if(Math.sin(angToE)<-0.3)inp.w=true;
  }else if(dEnemy<80){
    // Back off
    if(Math.cos(angToE)>0.3)inp.a=true;
    if(Math.cos(angToE)<-0.3)inp.d=true;
  }else{
    // Strafe
    inp.w=Math.random()>0.5;
    inp.s=!inp.w;
  }

  // Shoot
  if(dEnemy<350&&m.shootCd<=0)inp.lmb=true;

  // Melee if close
  if(dEnemy<70&&m.meleeCd<=0)inp.rmb=true;

  // Dash toward enemy sometimes
  if(dEnemy>150&&dEnemy<300&&m.dashCd<=0&&Math.random()<0.02)inp.space=true;

  // Parry if bullet nearby
  for(const b of gs.bullets){
    if(b.owner===p)continue;
    if(Math.hypot(b.x-m.x,b.y-m.y)<100){
      inp.q=true;break;
    }
  }
  for(const b of gs.tBullets){
    if(b.owner===p)continue;
    if(Math.hypot(b.x-m.x,b.y-m.y)<100){
      inp.q=true;break;
    }
  }

  // Build conveyors occasionally
  aiTimer-=TICK;
  if(aiTimer<=0){
    aiTimer=rng(2,5);
    // Try to build a conveyor toward nearest unowned node
    const unowned=gs.nodes.filter(n=>n.owner!==p);
    if(unowned.length>0){
      const nd=unowned[rngInt(0,unowned.length-1)];
      const nc=gridCtr(nd.gx,nd.gy);
      // Build path from core toward node
      const cc=toGrid(gs.cores[p].x,gs.cores[p].y);
      let cx=cc.gx,cy=cc.gy;
      const steps=rngInt(1,3);
      for(let s=0;s<steps;s++){
        const dx=Math.sign(nd.gx-cx),dy=Math.sign(nd.gy-cy);
        if(Math.abs(nd.gx-cx)>Math.abs(nd.gy-cy))cx+=dx;
        else cy+=dy;
        if(canPlaceBuild(gs,p,cx,cy,1)){
          placeBuild(gs,p,cx,cy,1);
          break;
        }
      }
    }
    // Place turret sometimes
    if(gs.energy[p]>TURR_COST+10&&Math.random()<0.3){
      const cc=toGrid(gs.cores[p].x,gs.cores[p].y);
      for(let tries=0;tries<10;tries++){
        const gx=cc.gx+rngInt(-4,4);
        const gy=cc.gy+rngInt(-4,4);
        if(canPlaceBuild(gs,p,gx,gy,3)){
          placeBuild(gs,p,gx,gy,3);
          break;
        }
      }
    }
    // Place wall sometimes
    if(gs.energy[p]>WALL_COST+10&&Math.random()<0.25){
      const cc=toGrid(gs.cores[p].x,gs.cores[p].y);
      for(let tries=0;tries<10;tries++){
        const gx=cc.gx+rngInt(-5,5);
        const gy=cc.gy+rngInt(-5,5);
        if(canPlaceBuild(gs,p,gx,gy,2)){
          placeBuild(gs,p,gx,gy,2);
          break;
        }
      }
    }
  }

  return inp;
}

// ==================== NETWORKING ====================
function createRoom(){
  isHost=true;myIndex=0;practiceMode=false;
  document.getElementById('status').textContent='Creating room...';
  peer=new Peer();
  peer.on('open',id=>{
    document.getElementById('room-id').textContent=id;
    document.getElementById('room-info').style.display='block';
    document.getElementById('status').textContent='Share the Room ID with your opponent. Waiting for connection...';
  });
  peer.on('connection',c=>{
    conn=c;
    setupConn();
  });
  peer.on('error',e=>{
    document.getElementById('status').textContent='Error: '+e.type;
  });
}

function joinRoom(){
  isHost=false;myIndex=1;practiceMode=false;
  const rid=document.getElementById('join-input').value.trim();
  if(!rid){document.getElementById('status').textContent='Please enter a Room ID';return}
  document.getElementById('status').textContent='Connecting to room...';
  peer=new Peer();
  peer.on('open',()=>{
    conn=peer.connect(rid,{reliable:true});
    setupConn();
  });
  peer.on('error',e=>{
    document.getElementById('status').textContent='Connection error: '+e.type+'. Check the Room ID and try again.';
  });
}

function startPractice(){
  isHost=true;myIndex=0;practiceMode=true;
  gameState=createGameState();
  document.getElementById('menu').style.display='none';
}

function setupConn(){
  conn.on('open',()=>{
    document.getElementById('status').textContent='Connected! Starting game...';
    if(isHost){
      gameState=createGameState();
      document.getElementById('menu').style.display='none';
    }
  });
  conn.on('data',data=>{
    if(isHost){
      if(data.t==='i')remoteInput=data;
    }else{
      if(data.t==='s'){
        gameState=data.s;
        if(gameState&&gameState.phase!=='menu'){
          const m=document.getElementById('menu');
          if(m.style.display!=='none')m.style.display='none';
        }
      }
    }
  });
  conn.on('close',()=>{
    document.getElementById('status').textContent='Opponent disconnected. Refresh to play again.';
  });
}

// ==================== BUILDING LOGIC ====================
function canPlaceBuild(gs,p,gx,gy,type){
  if(gx<0||gx>=COLS||gy<0||gy>=ROWS)return false;
  for(const b of gs.buildings)if(b.gx===gx&&b.gy===gy)return false;
  // Not on cores
  for(const c of gs.cores){
    const cc=toGrid(c.x,c.y);
    if(Math.abs(gx-cc.gx)<=1&&Math.abs(gy-cc.gy)<=1)return false;
  }
  // Not on nodes
  for(const n of gs.nodes)if(n.gx===gx&&n.gy===gy)return false;
  // Territory or adjacency check
  const mySide=(p===0&&gx<20)||(p===1&&gx>=20);
  const adjBld=gs.buildings.some(b=>b.owner===p&&Math.abs(b.gx-gx)+Math.abs(b.gy-gy)<=1);
  const cc=toGrid(gs.cores[p].x,gs.cores[p].y);
  const adjCore=Math.abs(gx-cc.gx)<=2&&Math.abs(gy-cc.gy)<=2;
  const adjNode=gs.nodes.some(n=>Math.abs(n.gx-gx)+Math.abs(n.gy-gy)<=1);
  if(!mySide&&!adjBld&&!adjCore&&!adjNode)return false;
  const cost=type===1?CONV_COST:type===2?WALL_COST:TURR_COST;
  return gs.energy[p]>=cost;
}

function placeBuild(gs,p,gx,gy,type){
  const cost=type===1?CONV_COST:type===2?WALL_COST:TURR_COST;
  gs.energy[p]-=cost;
  const hp=type===1?999:type===2?WALL_HP:TURR_HP;
  gs.buildings.push({type,gx,gy,owner:p,hp,maxHp:hp,connected:false,fireCd:0});
}

// ==================== PARTICLES ====================
function spawnPx(gs,x,y,col,n){
  for(let i=0;i<n;i++){
    const a=rng(0,Math.PI*2),sp=rng(50,220);
    gs.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:rng(0.15,0.5),maxLife:0.5,color:col,r:rng(1.5,4.5)});
  }
}
function spawnHitPx(gs,x,y,col){
  for(let i=0;i<5;i++){
    const a=rng(0,Math.PI*2),sp=rng(80,180);
    gs.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:rng(0.1,0.35),maxLife:0.35,color:col,r:rng(1,3)});
  }
}

// ==================== GAME UPDATE (HOST ONLY) ====================
function updateGame(gs,dt){
  if(gs.phase==='countdown'){
    gs.countdown-=dt;
    gs.time+=dt;animTime=gs.time;
    if(gs.countdown<=0){gs.phase='playing';gs.countdown=0}
    return;
  }
  if(gs.phase==='gameover')return;

  gs.time+=dt;animTime=gs.time;

  // Collect inputs
  const inp=[null,null];
  inp[0]=captureInput();
  if(practiceMode){
    inp[1]=getAIInput(gs,1);
  }else{
    inp[1]=remoteInput?{
      w:!!remoteInput.w,a:!!remoteInput.a,s:!!remoteInput.s,d:!!remoteInput.d,
      space:!!remoteInput.space,q:!!remoteInput.q,
      mx:remoteInput.mx,my:remoteInput.my,
      lmb:!!remoteInput.lmb,rmb:!!remoteInput.rmb,
      buildMode:remoteInput.buildMode||0
    }:null;
  }

  // Process each player
  for(let p=0;p<2;p++){
    const m=gs.mechs[p];
    const i=inp[p];
    if(!i)continue;

    // If dead, handle respawn
    if(m.dead){
      m.respawnTimer-=dt;
      if(m.respawnTimer<=0){
        m.dead=false;m.hp=MECH_HP;
        m.x=CORE_CTR[p].x;m.y=CORE_CTR[p].y-50;
        m.vx=0;m.vy=0;m.invTimer=1.5;
      }
      continue;
    }

    // Facing
    m.facing=Math.atan2(i.my-m.y,i.mx-m.x);

    // Parry (hold Q)
    m.parrying=i.q&&!m.dashing&&!m.meleeing;

    // Melee (right click)
    if(i.rmb&&!m.meleeing&&m.meleeCd<=0&&!m.dashing&&!m.parrying){
      m.meleeing=true;m.meleeTimer=MELEE_DUR;m.meleeCd=MELEE_CD;
      if(p===0)gs.meleeHitP1=false;else gs.meleeHitP2=false;
    }
    if(m.meleeing){m.meleeTimer-=dt;if(m.meleeTimer<=0)m.meleeing=false}
    if(m.meleeCd>0)m.meleeCd-=dt;

    // Dash (space)
    if(i.space&&!m.dashing&&m.dashCd<=0&&!m.meleeing){
      m.dashing=true;m.dashTimer=DASH_DUR;m.dashCd=DASH_CD;
      m.dashDx=Math.cos(m.facing);m.dashDy=Math.sin(m.facing);
      m.invTimer=DASH_DUR;
    }
    if(m.dashing){m.dashTimer-=dt;if(m.dashTimer<=0)m.dashing=false}
    if(m.dashCd>0)m.dashCd-=dt;
    if(m.invTimer>0)m.invTimer-=dt;

    // Movement
    if(!m.dashing){
      let ax=0,ay=0;
      if(i.w)ay=-1;if(i.s)ay=1;if(i.a)ax=-1;if(i.d)ax=1;
      const len=Math.hypot(ax,ay);
      if(len>0){ax/=len;ay/=len;m.vx+=ax*MECH_ACCEL*dt;m.vy+=ay*MECH_ACCEL*dt}
      m.vx*=MECH_FRICTION;m.vy*=MECH_FRICTION;
      const sp=Math.hypot(m.vx,m.vy);
      if(sp>MECH_MAX_SPEED){m.vx*=MECH_MAX_SPEED/sp;m.vy*=MECH_MAX_SPEED/sp}
    }else{
      m.vx=m.dashDx*DASH_SPEED;m.vy=m.dashDy*DASH_SPEED;
    }
    if(m.parrying){m.vx*=0.65;m.vy*=0.65}

    m.x+=m.vx*dt;m.y+=m.vy*dt;
    m.x=clamp(m.x,MECH_R,W-MECH_R);m.y=clamp(m.y,MECH_R,H-MECH_R);

    // Shooting
    if(m.shootCd>0)m.shootCd-=dt;
    if(i.lmb&&!m.dashing&&!m.parrying&&i.buildMode===0&&m.shootCd<=0){
      if(gs.energy[p]>=BULLET_COST){
        gs.energy[p]-=BULLET_COST;m.shootCd=SHOOT_CD;
        const bx=m.x+Math.cos(m.facing)*22;
        const by=m.y+Math.sin(m.facing)*22;
        gs.bullets.push({x:bx,y:by,vx:Math.cos(m.facing)*BULLET_SPEED,vy:Math.sin(m.facing)*BULLET_SPEED,
          owner:p,dmg:BULLET_DMG,reflected:false,life:BULLET_LIFE});
      }
    }

    // Building placement (click-based)
    if(i.lmb&&i.buildMode>0){
      const gx=Math.floor(i.mx/CELL),gy=Math.floor(i.my/CELL);
      if(gx>=0&&gx<COLS&&gy>=0&&gy<ROWS){
        if(canPlaceBuild(gs,p,gx,gy,i.buildMode)){
          placeBuild(gs,p,gx,gy,i.buildMode);
        }
      }
    }
  }

  // === COLLISIONS ===
  // Mech vs wall/turret buildings
  for(let p=0;p<2;p++){
    const m=gs.mechs[p];if(m.dead)continue;
    for(const b of gs.buildings){
      if(b.type==='conveyor')continue;
      const bc=gridCtr(b.gx,b.gy);
      const bx=bc.x-CELL/2,by=bc.y-CELL/2;
      if(rectCircle(bx,by,CELL,CELL,m.x,m.y,MECH_R)){
        const cx=clamp(m.x,bx,bx+CELL),cy=clamp(m.y,by,by+CELL);
        const dx=m.x-cx,dy=m.y-cy;
        const d=Math.hypot(dx,dy)||0.01;
        const ov=MECH_R-d;
        if(ov>0){m.x+=dx/d*ov;m.y+=dy/d*ov}
      }
    }
    // Core collision
    for(const c of gs.cores){
      if(rectCircle(c.x-CORE_SIZE/2,c.y-CORE_SIZE/2,CORE_SIZE,CORE_SIZE,m.x,m.y,MECH_R)){
        const cx=clamp(m.x,c.x-CORE_SIZE/2,c.x+CORE_SIZE/2);
        const cy=clamp(m.y,c.y-CORE_SIZE/2,c.y+CORE_SIZE/2);
        const dx=m.x-cx,dy=m.y-cy;
        const d=Math.hypot(dx,dy)||0.01;
        const ov=MECH_R-d;
        if(ov>0){m.x+=dx/d*ov;m.y+=dy/d*ov}
      }
    }
  }

  // Mech vs mech
  {
    const m0=gs.mechs[0],m1=gs.mechs[1];
    if(!m0.dead&&!m1.dead){
      const dx=m1.x-m0.x,dy=m1.y-m0.y;
      const d=Math.hypot(dx,dy)||0.01;
      const ov=MECH_R*2-d;
      if(ov>0){
        const nx=dx/d,ny=dy/d;
        m0.x-=nx*ov/2;m0.y-=ny*ov/2;
        m1.x+=nx*ov/2;m1.y+=ny*ov/2;
        // Bounce
        const rvx=m0.vx-m1.vx,rvy=m0.vy-m1.vy;
        const dot=rvx*nx+rvy*ny;
        if(dot>0){
          m0.vx-=dot*nx*0.5;m0.vy-=dot*ny*0.5;
          m1.vx+=dot*nx*0.5;m1.vy+=dot*ny*0.5;
        }
      }
      // Dash collision damage
      if(d<MECH_R*2+8){
        if(m0.dashing&&m1.invTimer<=0){
          m1.hp-=DASH_DMG;m1.vx+=m0.dashDx*280;m1.vy+=m0.dashDy*280;
          spawnPx(gs,m1.x,m1.y,'#0ff',6);
        }
        if(m1.dashing&&m0.invTimer<=0){
          m0.hp-=DASH_DMG;m0.vx+=m1.dashDx*280;m0.vy+=m1.dashDy*280;
          spawnPx(gs,m0.x,m0.y,'#f60',6);
        }
      }
    }
  }

  // Melee hitbox
  for(let p=0;p<2;p++){
    const m=gs.mechs[p];
    if(!m.meleeing||m.dead)continue;
    const prog=1-m.meleeTimer/MELEE_DUR;
    if(prog<0.2||prog>0.75)continue;
    const hx=m.x+Math.cos(m.facing)*MELEE_RANGE;
    const hy=m.y+Math.sin(m.facing)*MELEE_RANGE;
    const hitFlag=p===0?'meleeHitP1':'meleeHitP2';

    // Melee vs enemy mech
    const ep=1-p;const em=gs.mechs[ep];
    if(!em.dead&&!gs[hitFlag]&&Math.hypot(hx-em.x,hy-em.y)<MECH_R+MELEE_HALF_W){
      if(em.invTimer<=0){
        em.hp-=MELEE_DMG_MECH;
        em.vx+=Math.cos(m.facing)*MELEE_KB;em.vy+=Math.sin(m.facing)*MELEE_KB;
        gs[hitFlag]=true;
        spawnPx(gs,em.x,em.y,'#ff0',10);
      }
    }
    // Melee vs enemy buildings (instant destroy)
    for(let bi=gs.buildings.length-1;bi>=0;bi--){
      const b=gs.buildings[bi];
      if(b.owner===p)continue;
      const bc=gridCtr(b.gx,b.gy);
      if(Math.hypot(hx-bc.x,hy-bc.y)<CELL*0.7+MELEE_HALF_W){
        b.hp=0;
        spawnPx(gs,bc.x,bc.y,'#fa0',8);
      }
    }
    // Melee vs enemy core
    const eco=gs.cores[ep];
    if(Math.hypot(hx-eco.x,hy-eco.y)<CORE_SIZE/2+MELEE_HALF_W){
      eco.hp-=MELEE_DMG_MECH*0.4;
      spawnPx(gs,eco.x,eco.y,'#f00',5);
    }
  }

  // === BULLET UPDATE ===
  for(let bi=gs.bullets.length-1;bi>=0;bi--){
    const b=gs.bullets[bi];
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
    if(b.life<=0||b.x<-10||b.x>W+10||b.y<-10||b.y>H+10){gs.bullets.splice(bi,1);continue}

    let hit=false;

    // Bullet vs mechs
    for(let p=0;p<2;p++){
      if(p===b.owner&&!b.reflected)continue;
      const m=gs.mechs[p];if(m.dead||m.invTimer>0)continue;

      // Parry check
      if(m.parrying){
        // Is bullet within the parry shield arc?
        if(pointInArc(b.x,b.y,m.x,m.y,m.facing,PARRY_ARC/2,PARRY_DIST)){
          // Reflect!
          const spd=Math.hypot(b.vx,b.vy)*1.35;
          // Reflect: reverse direction + small random spread
          const refAng=Math.atan2(-b.vy,-b.vx)+rng(-0.15,0.15);
          b.vx=Math.cos(refAng)*spd;b.vy=Math.sin(refAng)*spd;
          b.owner=p;b.reflected=true;b.dmg=Math.ceil(b.dmg*1.5);
          spawnPx(gs,b.x,b.y,'#fff',5);
          continue; // don't hit, it's reflected
        }
      }

      // Hit mech
      if(circleCircle(b.x,b.y,5,m.x,m.y,MECH_R)){
        m.hp-=b.dmg;
        spawnHitPx(gs,b.x,b.y,b.reflected?'#fff':'#f80');
        hit=true;break;
      }
    }
    if(hit){gs.bullets.splice(bi,1);continue}

    // Bullet vs buildings
    for(let bbi=gs.buildings.length-1;bbi>=0;bbi--){
      const bld=gs.buildings[bbi];
      if(bld.owner===b.owner&&!b.reflected)continue;
      const bc=gridCtr(bld.gx,b.gy);
      if(rectCircle(bc.x-CELL/2,bc.y-CELL/2,CELL,CELL,b.x,b.y,5)){
        bld.hp-=b.dmg;
        spawnHitPx(gs,b.x,b.y,'#fa0');
        hit=true;break;
      }
    }
    if(hit){gs.bullets.splice(bi,1);continue}

    // Bullet vs cores
    for(let p=0;p<2;p++){
      if(p===b.owner&&!b.reflected)continue;
      const co=gs.cores[p];
      if(rectCircle(co.x-CORE_SIZE/2,co.y-CORE_SIZE/2,CORE_SIZE,CORE_SIZE,b.x,b.y,5)){
        co.hp-=b.dmg;
        spawnHitPx(gs,b.x,b.y,'#f44');
        hit=true;break;
      }
    }
    if(hit){gs.bullets.splice(bi,1);continue}

    // Bullet vs enemy walls (block)
    for(const bld of gs.buildings){
      if(bld.type==='wall'&&bld.owner!==b.owner){
        const bc=gridCtr(bld.gx,bld.gy);
        if(rectCircle(bc.x-CELL/2,bc.y-CELL/2,CELL,CELL,b.x,b.y,5)){hit=true;break}
      }
    }
    if(hit)gs.bullets.splice(bi,1);
  }

  // Remove dead buildings
  gs.buildings=gs.buildings.filter(b=>b.hp>0);

  // === TURRET AI ===
  for(const b of gs.buildings){
    if(b.type!=='turret')continue;
    if(b.fireCd===undefined)b.fireCd=0;
    if(b.fireCd>0){b.fireCd-=dt;continue}
    const bc=gridCtr(b.gx,b.gy);
    const ep=1-b.owner;
    const em=gs.mechs[ep];
    let target=null,minD=TURR_RANGE;
    // Target enemy mech
    if(!em.dead){
      const d1=Math.hypot(bc.x-em.x,bc.y-em.y);
      if(d1<minD){minD=d1;target={x:em.x,y:em.y}}
    }
    // Target enemy core
    const eco=gs.cores[ep];
    const d2=Math.hypot(bc.x-eco.x,bc.y-eco.y);
    if(d2<minD){minD=d2;target={x:eco.x,y:eco.y}}

    if(target&&gs.energy[b.owner]>=TURR_ENERGY_COST){
      gs.energy[b.owner]-=TURR_ENERGY_COST;
      b.fireCd=TURR_FIRE_RATE;
      const ang=Math.atan2(target.y-bc.y,target.x-bc.x);
      gs.tBullets.push({x:bc.x,y:bc.y,vx:Math.cos(ang)*BULLET_SPEED*0.85,vy:Math.sin(ang)*BULLET_SPEED*0.85,
        owner:b.owner,dmg:TURR_DMG,life:1.4,reflected:false});
    }
  }

  // Turret bullet update
  for(let bi=gs.tBullets.length-1;bi>=0;bi--){
    const b=gs.tBullets[bi];
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
    if(b.life<=0||b.x<-10||b.x>W+10||b.y<-10||b.y>H+10){gs.tBullets.splice(bi,1);continue}
    let hit=false;
    const ep=1-b.owner;const em=gs.mechs[ep];
    // vs mech
    if(!em.dead&&em.invTimer<=0&&circleCircle(b.x,b.y,4,em.x,em.y,MECH_R)){
      em.hp-=b.dmg;hit=true;spawnHitPx(gs,b.x,b.y,'#fa0');
    }
    // vs walls
    if(!hit)for(const bld of gs.buildings){
      if(bld.type==='wall'&&bld.owner!==b.owner){
        const bc=gridCtr(bld.gx,bld.gy);
        if(rectCircle(bc.x-CELL/2,bc.y-CELL/2,CELL,CELL,b.x,b.y,4)){hit=true;break}
      }
    }
    if(hit)gs.tBullets.splice(bi,1);
  }

  // === ENERGY ===
  computeEnergy(gs);
  for(let p=0;p<2;p++){
    gs.energy[p]=Math.min(MAX_ENERGY,gs.energy[p]+gs.connectedNodes[p]*NODE_RATE*dt);
  }

  // === PARTICLES ===
  for(let pi=gs.particles.length-1;pi>=0;pi--){
    const p2=gs.particles[pi];
    p2.x+=p2.vx*dt;p2.y+=p2.vy*dt;p2.life-=dt;
    if(p2.life<=0)gs.particles.splice(pi,1);
  }

  // === DEATH & WIN CHECK ===
  for(let p=0;p<2;p++){
    const m=gs.mechs[p];
    if(m.hp<=0&&!m.dead){
      m.dead=true;m.hp=0;m.respawnTimer=3;
      spawnPx(gs,m.x,m.y,p===0?P_COL[0]:E_COL[0],15);
    }
    if(gs.cores[p].hp<=0){
      gs.phase='gameover';gs.winner=1-p;
    }
  }
}

// ==================== RENDERING ====================
function render(gs){
  // Background
  ctx.fillStyle='#080818';
  ctx.fillRect(0,0,W,H);

  // Subtle grid
  ctx.strokeStyle='#12122a';ctx.lineWidth=0.5;
  for(let x=0;x<=W;x+=CELL){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<=H;y+=CELL){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

  // Territory tint
  ctx.fillStyle='rgba(0,60,80,0.04)';
  ctx.fillRect(0,0,W/2,H);
  ctx.fillStyle='rgba(80,40,0,0.04)';
  ctx.fillRect(W/2,0,W/2,H);

  // Territory divider
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=2;
  ctx.setLineDash([10,10]);
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
  ctx.setLineDash([]);

  // === CONVEYORS ===
  for(const b of gs.buildings){
    if(b.type!=='conveyor')continue;
    const bc=gridCtr(b.gx,b.gy);
    const col=b.owner===0?P_DIM[0]:E_DIM[0];
    const colB=b.owner===0?P_COL[0]:E_COL[0];
    // Background
    ctx.fillStyle=b.connected?col:'#0a0a12';
    ctx.fillRect(bc.x-CELL/2+2,bc.y-CELL/2+2,CELL-4,CELL-4);
    // Border
    ctx.strokeStyle=b.connected?colB:'#222';
    ctx.lineWidth=1;
    ctx.strokeRect(bc.x-CELL/2+2,bc.y-CELL/2+2,CELL-4,CELL-4);
    // Animated flow arrows
    if(b.connected){
      ctx.save();ctx.translate(bc.x,bc.y);
      const co=gs.cores[b.owner];
      const ang=Math.atan2(co.y-bc.y,co.x-bc.x);
      const snap=Math.round(ang/(Math.PI/2))*(Math.PI/2);
      ctx.rotate(snap);
      const offset=(animTime*90)%24;
      ctx.fillStyle=colB;ctx.globalAlpha=0.6;
      for(let i=-1;i<=1;i++){
        const ox=-12+i*24+offset;
        ctx.beginPath();ctx.moveTo(ox-5,-5);ctx.lineTo(ox+5,0);ctx.lineTo(ox-5,5);ctx.fill();
      }
      ctx.globalAlpha=1;ctx.restore();
    }
  }

  // === WALLS ===
  for(const b of gs.buildings){
    if(b.type!=='wall')continue;
    const bc=gridCtr(b.gx,b.gy);
    const fill=b.owner===0?P_BLDG[0]:E_BLDG[0];
    const bdr=b.owner===0?P_COL[0]:E_COL[0];
    ctx.fillStyle=fill;
    ctx.fillRect(bc.x-CELL/2+1,bc.y-CELL/2+1,CELL-2,CELL-2);
    // Cross pattern
    ctx.strokeStyle=bdr;ctx.lineWidth=1;ctx.globalAlpha=0.3;
    ctx.beginPath();ctx.moveTo(bc.x-CELL/2+1,bc.y-CELL/2+1);ctx.lineTo(bc.x+CELL/2-1,bc.y+CELL/2-1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(bc.x+CELL/2-1,bc.y-CELL/2+1);ctx.lineTo(bc.x-CELL/2+1,bc.y+CELL/2-1);ctx.stroke();
    ctx.globalAlpha=1;
    ctx.strokeStyle=bdr;ctx.lineWidth=2;
    ctx.strokeRect(bc.x-CELL/2+1,bc.y-CELL/2+1,CELL-2,CELL-2);
    // HP bar
    if(b.hp<b.maxHp){
      const pct=b.hp/b.maxHp;
      ctx.fillStyle='#300';ctx.fillRect(bc.x-CELL/2,bc.y-CELL/2-7,CELL,4);
      ctx.fillStyle='#0c0';ctx.fillRect(bc.x-CELL/2,bc.y-CELL/2-7,CELL*pct,4);
    }
  }

  // === TURRETS ===
  for(const b of gs.buildings){
    if(b.type!=='turret')continue;
    const bc=gridCtr(b.gx,b.gy);
    const col=b.owner===0?P_COL[0]:E_COL[0];
    const bg=b.owner===0?P_BG[0]:E_BG[0];
    // Range circle (faint)
    ctx.strokeStyle=col;ctx.lineWidth=0.5;ctx.globalAlpha=0.1;
    ctx.beginPath();ctx.arc(bc.x,bc.y,TURR_RANGE,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
    // Base
    ctx.fillStyle=bg;
    ctx.fillRect(bc.x-15,bc.y-15,30,30);
    ctx.strokeStyle=col;ctx.lineWidth=2;
    ctx.strokeRect(bc.x-15,bc.y-15,30,30);
    // Inner diamond
    ctx.fillStyle=col;ctx.globalAlpha=0.3;
    ctx.beginPath();ctx.moveTo(bc.x,bc.y-8);ctx.lineTo(bc.x+8,bc.y);ctx.lineTo(bc.x,bc.y+8);ctx.lineTo(bc.x-8,bc.y);ctx.closePath();ctx.fill();
    ctx.globalAlpha=1;
    // Gun barrel
    const ep=1-b.owner;const em=gs.mechs[ep];
    let aimAng=Math.atan2(em.y-bc.y,em.x-bc.x);
    ctx.strokeStyle=col;ctx.lineWidth=4;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(bc.x,bc.y);ctx.lineTo(bc.x+Math.cos(aimAng)*20,bc.y+Math.sin(aimAng)*20);ctx.stroke();
    ctx.lineCap='butt';
    // HP bar
    if(b.hp<b.maxHp){
      const pct=b.hp/b.maxHp;
      ctx.fillStyle='#300';ctx.fillRect(bc.x-CELL/2,bc.y-CELL/2-7,CELL,4);
      ctx.fillStyle='#0c0';ctx.fillRect(bc.x-CELL/2,bc.y-CELL/2-7,CELL*pct,4);
    }
  }

  // === RESOURCE NODES ===
  for(const n of gs.nodes){
    const nc=gridCtr(n.gx,n.gy);
    const col=n.owner===0?P_COL[0]:n.owner===1?E_COL[0]:'#666';
    const glow=n.owner===0?P_GLOW[0]:n.owner===1?E_GLOW[0]:'rgba(100,100,100,0.15)';
    // Pulse glow
    const pulse=1+Math.sin(animTime*2.5)*0.15;
    ctx.fillStyle=glow;
    ctx.beginPath();ctx.arc(nc.x,nc.y,28*pulse,0,Math.PI*2);ctx.fill();
    // Hexagon
    ctx.fillStyle=n.owner>=0?(n.owner===0?'#0a2a2a':'#2a1a0a'):'#1a1a1a';
    ctx.strokeStyle=col;ctx.lineWidth=2;
    ctx.beginPath();
    for(let i=0;i<6;i++){
      const a=Math.PI/3*i-Math.PI/6;
      const px=nc.x+18*Math.cos(a),py=nc.y+18*Math.sin(a);
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.closePath();ctx.fill();ctx.stroke();
    // Energy icon
    ctx.fillStyle=col;ctx.font='bold 13px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('E',nc.x,nc.y+1);
    // Owner indicator
    if(n.owner>=0){
      ctx.fillStyle=col;ctx.font='9px monospace';
      ctx.fillText('P'+(n.owner+1),nc.x,nc.y+22);
    }
  }

  // === CORES ===
  for(let p=0;p<2;p++){
    const co=gs.cores[p];
    const col=p===0?P_COL[0]:E_COL[0];
    const glow=p===0?P_GLOW[0]:E_GLOW[0];
    const bg=p===0?P_BG[0]:E_BG[0];
    // Glow
    ctx.fillStyle=glow;
    ctx.fillRect(co.x-CORE_SIZE/2-12,co.y-CORE_SIZE/2-12,CORE_SIZE+24,CORE_SIZE+24);
    // Body with pulse
    const pls=Math.sin(animTime*3)*3;
    const hs=CORE_SIZE/2+pls/2;
    ctx.fillStyle=bg;
    ctx.fillRect(co.x-hs,co.y-hs,hs*2,hs*2);
    ctx.strokeStyle=col;ctx.lineWidth=3;
    ctx.strokeRect(co.x-hs,co.y-hs,hs*2,hs*2);
    // Inner glow
    ctx.fillStyle=col;ctx.globalAlpha=0.25+Math.sin(animTime*4)*0.1;
    ctx.fillRect(co.x-16,co.y-16,32,32);
    ctx.globalAlpha=1;
    // Inner circuit pattern
    ctx.strokeStyle=col;ctx.lineWidth=1;ctx.globalAlpha=0.4;
    ctx.beginPath();ctx.moveTo(co.x-20,co.y);ctx.lineTo(co.x+20,co.y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(co.x,co.y-20);ctx.lineTo(co.x,co.y+20);ctx.stroke();
    ctx.globalAlpha=1;
    // HP bar
    const pct=co.hp/co.maxHp;
    ctx.fillStyle='#300';ctx.fillRect(co.x-CORE_SIZE/2,co.y-CORE_SIZE/2-14,CORE_SIZE,8);
    ctx.fillStyle=pct>0.5?'#0c0':pct>0.25?'#cc0':'#c00';
    ctx.fillRect(co.x-CORE_SIZE/2,co.y-CORE_SIZE/2-14,CORE_SIZE*pct,8);
    ctx.strokeStyle='#555';ctx.lineWidth=1;
    ctx.strokeRect(co.x-CORE_SIZE/2,co.y-CORE_SIZE/2-14,CORE_SIZE,8);
    // Label
    ctx.fillStyle=col;ctx.font='bold 11px monospace';ctx.textAlign='center';
    ctx.fillText(p===0?'P1 CORE':'P2 CORE',co.x,co.y+CORE_SIZE/2+18);
  }

  // === BULLETS ===
  for(const b of gs.bullets){
    const col=b.owner===0?P_COL[0]:E_COL[0];
    // Trail
    ctx.strokeStyle=b.reflected?'#fff':col;ctx.lineWidth=2;ctx.globalAlpha=0.35;
    ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x-b.vx*0.025,b.y-b.vy*0.025);ctx.stroke();
    ctx.globalAlpha=1;
    // Bullet
    ctx.fillStyle=b.reflected?'#fff':col;
    ctx.beginPath();ctx.arc(b.x,b.y,b.reflected?5:3.5,0,Math.PI*2);ctx.fill();
    if(b.reflected){
      ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.globalAlpha=0.5;
      ctx.beginPath();ctx.arc(b.x,b.y,7,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=1;
    }
  }
  // Turret bullets
  for(const b of gs.tBullets){
    ctx.fillStyle=b.owner===0?P_COL[0]:E_COL[0];
    ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();
  }

  // === MECHS ===
  for(let p=0;p<2;p++){
    const m=gs.mechs[p];
    if(m.dead){
      // Respawn indicator
      ctx.fillStyle=p===0?P_COL[0]:E_COL[0];ctx.globalAlpha=0.5;
      ctx.font='12px monospace';ctx.textAlign='center';
      ctx.fillText('RESPAWN '+Math.ceil(m.respawnTimer)+'s',m.x,m.y);
      ctx.globalAlpha=1;
      continue;
    }
    const col=p===0?P_COL[0]:E_COL[0];
    const bg=p===0?P_BG[0]:E_BG[0];

    ctx.save();ctx.translate(m.x,m.y);ctx.rotate(m.facing);

    // Invincibility flash
    if(m.invTimer>0&&Math.floor(m.invTimer*12)%2===0)ctx.globalAlpha=0.4;

    // Dash trail
    if(m.dashing){
      ctx.fillStyle=p===0?'rgba(0,255,255,0.15)':'rgba(255,100,0,0.15)';
      ctx.beginPath();ctx.arc(0,0,MECH_R+12,0,Math.PI*2);ctx.fill();
      // Speed lines
      ctx.strokeStyle=col;ctx.lineWidth=1;ctx.globalAlpha=0.4;
      for(let i=0;i<3;i++){
        const oy=(i-1)*8;
        ctx.beginPath();ctx.moveTo(-MECH_R-15,oy);ctx.lineTo(-MECH_R-5-rng(0,10),oy);ctx.stroke();
      }
      ctx.globalAlpha=m.invTimer>0&&Math.floor(m.invTimer*12)%2===0?0.4:1;
    }

    // Parry shield aura
    if(m.parrying){
      ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.globalAlpha=0.6;
      ctx.beginPath();ctx.arc(0,0,MECH_R+14,-PARRY_ARC/2,PARRY_ARC/2);ctx.stroke();
      ctx.fillStyle='rgba(200,200,255,0.12)';
      ctx.beginPath();ctx.moveTo(0,0);
      ctx.arc(0,0,MECH_R+14,-PARRY_ARC/2,PARRY_ARC/2);ctx.closePath();ctx.fill();
      ctx.globalAlpha=m.invTimer>0&&Math.floor(m.invTimer*12)%2===0?0.4:1;
    }

    // Mech body (triangle with notch)
    ctx.fillStyle=bg;
    ctx.strokeStyle=col;ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(MECH_R+5,0);
    ctx.lineTo(-MECH_R+2,-MECH_R+2);
    ctx.lineTo(-MECH_R+8,0);
    ctx.lineTo(-MECH_R+2,MECH_R-2);
    ctx.closePath();
    ctx.fill();ctx.stroke();

    // Engine glow
    ctx.fillStyle=col;ctx.globalAlpha*=0.5;
    ctx.beginPath();ctx.arc(-MECH_R+5,0,4,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=m.invTimer>0&&Math.floor(m.invTimer*12)%2===0?0.4:1;

    // Weapon
    if(m.meleeing){
      const prog=1-m.meleeTimer/MELEE_DUR;
      const ext=prog<0.45?prog/0.45*MELEE_RANGE:(1-prog)/0.55*MELEE_RANGE;
      // Piledriver
      ctx.fillStyle='#ff0';ctx.globalAlpha*=0.85;
      ctx.fillRect(MECH_R,-5,ext,10);
      ctx.fillStyle='#fff';
      ctx.fillRect(MECH_R+ext-4,-6,8,12);
      ctx.globalAlpha=m.invTimer>0&&Math.floor(m.invTimer*12)%2===0?0.4:1;
    }else{
      // Dual gun barrels
      ctx.strokeStyle=col;ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(MECH_R,-4);ctx.lineTo(MECH_R+10,-4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(MECH_R,4);ctx.lineTo(MECH_R+10,4);ctx.stroke();
      // Muzzle flash on recent shot
      if(m.shootCd>SHOOT_CD*0.7){
        ctx.fillStyle='#fff';ctx.globalAlpha*=0.7;
        ctx.beginPath();ctx.arc(MECH_R+12,0,5,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=m.invTimer>0&&Math.floor(m.invTimer*12)%2===0?0.4:1;
      }
    }

    ctx.globalAlpha=1;
    ctx.restore();

    // HP bar above mech
    const barW=42,barH=5;
    const bx=m.x-barW/2,by=m.y-MECH_R-16;
    ctx.fillStyle='#300';ctx.fillRect(bx,by,barW,barH);
    ctx.fillStyle=m.hp>60?'#0c0':m.hp>30?'#cc0':'#c00';
    ctx.fillRect(bx,by,barW*(m.hp/m.maxHp),barH);
    ctx.strokeStyle='#555';ctx.lineWidth=0.5;ctx.strokeRect(bx,by,barW,barH);

    // Player label
    ctx.fillStyle=col;ctx.font='9px monospace';ctx.textAlign='center';
    ctx.fillText('P'+(p+1),m.x,m.y-MECH_R-20);
  }

  // === PARTICLES ===
  for(const p2 of gs.particles){
    const a=clamp(p2.life/p2.maxLife,0,1);
    ctx.fillStyle=p2.color;ctx.globalAlpha=a;
    ctx.beginPath();ctx.arc(p2.x,p2.y,p2.r*a,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // === BUILD PREVIEW ===
  if(buildMode>0&&gs.phase==='playing'){
    const gx=Math.floor(mouseX/CELL),gy=Math.floor(mouseY/CELL);
    if(gx>=0&&gx<COLS&&gy>=0&&gy<ROWS){
      const bc=gridCtr(gx,gy);
      const valid=canPlaceBuild(gs,myIndex,gx,gy,buildMode);
      ctx.fillStyle=valid?'rgba(0,255,0,0.15)':'rgba(255,0,0,0.15)';
      ctx.fillRect(bc.x-CELL/2,bc.y-CELL/2,CELL,CELL);
      ctx.strokeStyle=valid?'#0f0':'#f00';ctx.lineWidth=2;
      ctx.strokeRect(bc.x-CELL/2,bc.y-CELL/2,CELL,CELL);
      // Building type icon
      ctx.fillStyle=valid?'#0f0':'#f00';ctx.font='16px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
      const icon=buildMode===1?'>':buildMode===2?'#':'T';
      ctx.fillText(icon,bc.x,bc.y);
    }
  }

  // === HUD ===
  drawHUD(gs);
}

function drawHUD(gs){
  if(!gs)return;
  const p=myIndex;

  // Countdown overlay
  if(gs.phase==='countdown'){
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,W,H);
    const num=Math.ceil(gs.countdown);
    const txt=num>0?''+num:'GO!';
    ctx.fillStyle=num>0?'#0ff':'#0f0';
    ctx.font='bold 100px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=30;
    ctx.fillText(txt,W/2,H/2);
    ctx.shadowBlur=0;
    ctx.font='22px monospace';ctx.fillStyle='#aaa';
    ctx.fillText('GET READY!',W/2,H/2+70);
    if(practiceMode){
      ctx.fillStyle='#0f0';ctx.font='16px monospace';
      ctx.fillText('[ SOLO PRACTICE MODE ]',W/2,H/2+100);
    }
    return;
  }

  // Game Over overlay
  if(gs.phase==='gameover'){
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,W,H);
    const wcol=gs.winner===0?P_COL[0]:E_COL[0];
    ctx.fillStyle=wcol;ctx.font='bold 56px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor=wcol;ctx.shadowBlur=20;
    const label=practiceMode&&gs.winner===1?'AI WINS!':'PLAYER '+(gs.winner+1)+' WINS!';
    ctx.fillText(label,W/2,H/2);
    ctx.shadowBlur=0;
    ctx.font='20px monospace';ctx.fillStyle='#888';
    ctx.fillText('Refresh page to play again',W/2,H/2+55);
    return;
  }

  // In-game HUD
  const m=gs.mechs[p];
  const e=gs.energy[p];
  const cn=gs.connectedNodes[p];
  const col=p===0?P_COL[0]:E_COL[0];

  // Player info panel (top-left)
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(10,10,240,108);
  ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.strokeRect(10,10,240,108);

  ctx.font='bold 12px monospace';ctx.textAlign='left';ctx.textBaseline='top';

  // Mech HP
  ctx.fillStyle='#aaa';ctx.fillText('MECH',20,16);
  ctx.fillStyle='#300';ctx.fillRect(70,16,170,12);
  ctx.fillStyle=m.hp>60?'#0c0':m.hp>30?'#cc0':'#c00';
  ctx.fillRect(70,16,170*(Math.max(0,m.hp)/m.maxHp),12);
  ctx.fillStyle='#fff';ctx.font='9px monospace';
  ctx.fillText(Math.ceil(Math.max(0,m.hp))+'/'+m.maxHp,72,17);

  // Energy
  ctx.font='bold 12px monospace';ctx.fillStyle='#aaa';
  ctx.fillText('NRG',20,34);
  ctx.fillStyle='#003';ctx.fillRect(70,34,170,12);
  ctx.fillStyle='#08f';ctx.fillRect(70,34,170*(e/MAX_ENERGY),12);
  ctx.fillStyle='#fff';ctx.font='9px monospace';
  ctx.fillText(Math.floor(e)+'/'+MAX_ENERGY,72,35);

  // Nodes
  ctx.font='bold 12px monospace';ctx.fillStyle='#aaa';
  ctx.fillText('NODES',20,52);
  ctx.fillStyle='#cc0';ctx.fillText(cn+'/'+NODE_POS.length,80,52);

  // Core HP
  ctx.fillStyle='#aaa';ctx.font='11px monospace';
  ctx.fillText('Core: '+Math.ceil(Math.max(0,gs.cores[p].hp))+'/'+CORE_HP,20,72);

  // Dash cooldown
  const dashReady=m.dashCd<=0;
  ctx.fillStyle=dashReady?'#0f0':'#555';ctx.font='11px monospace';
  ctx.fillText('Dash: '+(dashReady?'READY':m.dashCd.toFixed(1)+'s'),20,88);

  // Melee cooldown
  const meleeReady=m.meleeCd<=0;
  ctx.fillStyle=meleeReady?'#0f0':'#555';
  ctx.fillText('Melee: '+(meleeReady?'READY':m.meleeCd.toFixed(1)+'s'),120,88);

  // Build mode indicator
  if(buildMode>0){
    const bname=buildMode===1?'CONVEYOR':buildMode===2?'WALL':'TURRET';
    const bcost=buildMode===1?CONV_COST:buildMode===2?WALL_COST:TURR_COST;
    const canAfford=e>=bcost;
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(W/2-110,H-48,220,38);
    ctx.strokeStyle=canAfford?'#0f0':'#f00';ctx.lineWidth=2;ctx.strokeRect(W/2-110,H-48,220,38);
    ctx.fillStyle=canAfford?'#0f0':'#f44';ctx.font='bold 14px monospace';ctx.textAlign='center';
    ctx.fillText('Placing: '+bname+' (-'+bcost+'E)',W/2,H-24);
  }

  // Hotkey guide (bottom-left)
  ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillRect(10,H-95,250,85);
  ctx.fillStyle='#666';ctx.font='10px monospace';ctx.textAlign='left';
  const y0=H-85;
  ctx.fillText('[1] Conveyor (-'+CONV_COST+'E)  [2] Wall (-'+WALL_COST+'E)',20,y0);
  ctx.fillText('[3] Turret (-'+TURR_COST+'E)  [Esc] Cancel',20,y0+14);
  ctx.fillText('[Q] Parry Shield  [Space] Dash',20,y0+28);
  ctx.fillText('[LMB] Shoot  [RMB] Piledriver Melee',20,y0+42);
  ctx.fillText('Connect Nodes to Core via Conveyors!',20,y0+58);

  // Enemy info (top-right)
  const ep=1-p;const em=gs.mechs[ep];const eco=gs.cores[ep];
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(W-240,10,230,75);
  ctx.strokeStyle=ep===0?P_COL[0]:E_COL[0];ctx.lineWidth=1.5;ctx.strokeRect(W-240,10,230,75);
  ctx.font='bold 12px monospace';ctx.textAlign='left';ctx.fillStyle='#aaa';
  ctx.fillText('ENEMY',W-230,16);
  ctx.fillStyle='#300';ctx.fillRect(W-170,16,150,12);
  ctx.fillStyle=em.hp>60?'#0c0':em.hp>30?'#cc0':'#c00';
  ctx.fillRect(W-170,16,150*(Math.max(0,em.hp)/em.maxHp),12);
  ctx.fillStyle='#888';ctx.font='10px monospace';
  ctx.fillText('Core: '+Math.ceil(Math.max(0,eco.hp))+'/'+CORE_HP+'  Nodes: '+gs.connectedNodes[ep]+'  NRG: '+Math.floor(gs.energy[ep]),W-230,38);
  ctx.fillText(em.dead?'RESPAWNING...':'ACTIVE',W-230,54);

  // Practice mode badge
  if(practiceMode){
    ctx.fillStyle='#0f0';ctx.font='bold 11px monospace';ctx.textAlign='center';
    ctx.fillText('[ SOLO PRACTICE ]',W/2,18);
  }
}

// ==================== GAME LOOP ====================
function gameLoop(timestamp){
  requestAnimationFrame(gameLoop);
  const dt=Math.min((timestamp-lastTime)/1000,0.1);
  lastTime=timestamp;

  if(!gameState){
    ctx.fillStyle='#080818';ctx.fillRect(0,0,W,H);
    return;
  }

  if(isHost||practiceMode){
    accumulator+=dt;
    let ticks=0;
    while(accumulator>=TICK&&ticks<3){
      updateGame(gameState,TICK);
      accumulator-=TICK;
      ticks++;
    }
    render(gameState);
    // Send state to joiner
    if(!practiceMode&&conn&&conn.open){
      try{conn.send({t:'s',s:gameState})}catch(e){}
    }
  }else{
    // Joiner: send input, render received state
    if(conn&&conn.open){
      try{
        const inp=captureInput();
        conn.send({t:'i',...inp});
      }catch(e){}
    }
    if(gameState){
      animTime=gameState.time||0;
      render(gameState);
    }
  }
}

// ==================== START ====================
lastTime=performance.now();
requestAnimationFrame(gameLoop);

</script>
</body>
</html>
