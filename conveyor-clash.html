<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONVEYOR CLASH: Mechs &amp; Logistics</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;user-select:none}
canvas{display:block;width:100vw;height:100vh;cursor:crosshair}
#menu{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,rgba(0,30,50,0.97),rgba(0,0,0,0.99));z-index:10}
#menu h1{color:#0ff;font-size:48px;text-shadow:0 0 30px #0ff,0 0 60px #08f;letter-spacing:5px;font-weight:900;margin-bottom:4px}
#menu h2{color:#f60;font-size:20px;letter-spacing:8px;text-transform:uppercase;font-weight:300;margin-bottom:36px}
.btn{padding:13px 40px;margin:7px;font-size:16px;border:2px solid #0ff;background:transparent;color:#0ff;cursor:pointer;transition:all .25s;font-family:inherit;letter-spacing:2px;text-transform:uppercase;outline:none}
.btn:hover{background:#0ff;color:#000;box-shadow:0 0 18px #0ff}
.btn.o{border-color:#f60;color:#f60}
.btn.o:hover{background:#f60;color:#000;box-shadow:0 0 18px #f60}
.btn.g{border-color:#0f0;color:#0f0}
.btn.g:hover{background:#0f0;color:#000;box-shadow:0 0 18px #0f0}
#roomInfo{color:#0f0;margin-top:18px;font-size:16px;display:none;text-align:center}
#roomInfo span{color:#ff0;font-size:18px;letter-spacing:1px;display:block;margin-top:4px;word-break:break-all;max-width:400px}
#ridInput{padding:11px;font-size:16px;background:#0a0a1a;border:2px solid #f60;color:#f60;width:340px;text-align:center;margin-top:10px;font-family:monospace;letter-spacing:1px;outline:none}
#ridInput::placeholder{color:#630}
#status{color:#999;margin-top:18px;font-size:13px;text-align:center;max-width:420px;min-height:40px}
#keys{color:#555;margin-top:28px;font-size:10px;text-align:center;line-height:2.2}
#keys kbd{background:#1a1a2a;border:1px solid #444;padding:1px 5px;border-radius:3px;color:#0ff;font-size:9px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="menu">
  <h1>CONVEYOR CLASH</h1>
  <h2>Mechs &amp; Logistics</h2>
  <button class="btn g" onclick="doPractice()">Solo Practice</button>
  <button class="btn" onclick="doHost()">Create Room</button>
  <div id="roomInfo">Share this Room ID:<span id="roomId"></span></div>
  <input id="ridInput" placeholder="Paste Room ID here">
  <button class="btn o" onclick="doJoin()">Join Room</button>
  <div id="status"></div>
  <div id="keys">
    <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move &bull;
    <kbd>Space</kbd> Dash &bull;
    <kbd>Q</kbd> Parry<br>
    <kbd>LMB</kbd> Shoot / Place &bull;
    <kbd>RMB</kbd> Piledriver Melee<br>
    <kbd>1</kbd> Conveyor &bull;
    <kbd>2</kbd> Wall &bull;
    <kbd>3</kbd> Turret &bull;
    <kbd>Esc</kbd> Cancel
  </div>
</div>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
"use strict";
// ====================================================================
//  CONVEYOR CLASH: Mechs & Logistics — Complete v3 (Critical Fixes)
// ====================================================================

// ─────────────── CONSTANTS ───────────────
const CELL=40, COLS=40, ROWS=22;
const W=COLS*CELL, H=ROWS*CELL+20;
const MR=16;                          // mech radius
const M_ACC=1500, M_FRIC=0.88, M_SPD=260, M_HP=120;
const D_SPD=640, D_DUR=0.2, D_CD=1.4, D_DMG=18;
const B_SPD=480, B_DMG=10, B_COST=4, B_LIFE=2.2, B_CD=0.2;
const ML_DMG_M=28, ML_DMG_B=9999, ML_RNG=52, ML_HW=18, ML_KB=520, ML_DUR=0.28, ML_CD=0.75;
const PA_ARC=Math.PI*0.6, PA_DIST=34;  // parry arc & distance
const CV_COST=3, WL_COST=5, TU_COST=16;
const WL_HP=120, TU_HP=70, TU_RNG=240, TU_DMG=9, TU_RATE=0.85, TU_ECOST=2;
const E_START=50, E_RATE=3.5, E_MAX=350;
const C_SZ=70, C_HP=600;
const PI=Math.PI, TAU=PI*2;

// Colors
const PC=['#0ff','#08f'], PD=['#066','#044'], PG=['rgba(0,255,255,0.25)','rgba(0,120,255,0.25)'];
const EC=['#f60','#f30'], ED=['#630','#420'], EG=['rgba(255,100,0,0.25)','rgba(255,50,0,0.25)'];
const PBG=['#0a3a3a','#0a1a3a'], PBL=['#1a4a4a','#1a2a4a'];
const EBG=['#3a1a0a','#3a0a0a'], EBL=['#4a2a1a','#4a1a1a'];

// Map landmarks
const NODES_DEF=[{gx:12,gy:4},{gx:19,gy:11},{gx:12,gy:17},{gx:27,gy:4},{gx:27,gy:17}];
const CORE_XY=[{x:120,y:440},{x:1480,y:440}];
const SPAWN_XY=[{x:220,y:440},{x:1380,y:440}];

// ─────────────── CANVAS ───────────────
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
cv.width=W; cv.height=H;

// ─────────────── GLOBAL STATE ───────────────
let peer=null, conn=null;
let isHost=false, myIdx=0, practice=false;
let gs=null;           // game state
let lt=0, acc=0;
const TICK=1/30;
let at=0;              // anim time
let connState='MENU';  // MENU | HOST_WAITING | CONNECTING | PLAYING | DISCONNECTED

// ─────────────── INPUT (event.code only!) ───────────────
const kd={};            // keydown state by code
let mx=W/2, my=H/2;    // mouse position
let mlDown=false, mrDown=false;
let mlClick=false, mrClick=false;   // single-frame clicks
let bMode=0;            // build mode 0=none 1=conv 2=wall 3=turret

document.addEventListener('keydown',e=>{
  // CRITICAL FIX: use e.code, never e.key
  const c=e.code;
  if(c==='Space') e.preventDefault();
  kd[c]=true;
  if(c==='Digit1') bMode=bMode===1?0:1;
  if(c==='Digit2') bMode=bMode===2?0:2;
  if(c==='Digit3') bMode=bMode===3?0:3;
  if(c==='Escape') bMode=0;
});
document.addEventListener('keyup',e=>{kd[e.code]=false});

cv.addEventListener('mousemove',e=>{
  const r=cv.getBoundingClientRect();
  mx=(e.clientX-r.left)*(W/r.width);
  my=(e.clientY-r.top)*(H/r.height);
});
cv.addEventListener('mousedown',e=>{
  e.preventDefault();
  if(e.button===0){mlDown=true;mlClick=true}
  if(e.button===2){mrDown=true;mrClick=true}
});
cv.addEventListener('mouseup',e=>{
  if(e.button===0) mlDown=false;
  if(e.button===2) mrDown=false;
});
cv.addEventListener('contextmenu',e=>e.preventDefault());

function snapInput(){
  // Reads from kd using event.code — layout-independent
  const o={
    w:!!kd['KeyW'], a:!!kd['KeyA'], s:!!kd['KeyS'], d:!!kd['KeyD'],
    space:!!kd['Space'], q:!!kd['KeyQ'],
    mx:mx, my:my,
    lmb:mlClick, rmb:mrClick,
    bm:bMode
  };
  mlClick=false; mrClick=false;
  return o;
}

// ─────────────── UTILITY ───────────────
function clamp(v,lo,hi){return v<lo?lo:v>hi?hi:v}
function rng(a,b){return a+Math.random()*(b-a)}
function rngI(a,b){return Math.floor(rng(a,b+1))}
function normA(a){while(a>PI)a-=TAU;while(a<-PI)a+=TAU;return a}
function gCtr(gx,gy){return{x:gx*CELL+CELL/2,y:gy*CELL+CELL/2}}
function toG(px,py){return{gx:Math.floor(px/CELL),gy:Math.floor(py/CELL)}}
function rCirc(rx,ry,rw,rh,cx2,cy,cr){
  const nx=clamp(cx2,rx,rx+rw),ny=clamp(cy,ry,ry+rh);
  return Math.hypot(cx2-nx,cy-ny)<cr;
}
function cCirc(x1,y1,r1,x2,y2,r2){return Math.hypot(x1-x2,y1-y2)<r1+r2}
function ptInArc(px,py,cx2,cy,fac,arcH,dist){
  const d=Math.hypot(px-cx2,py-cy);
  if(d>dist)return false;
  return Math.abs(normA(Math.atan2(py-cy,px-cx2)-fac))<arcH;
}

// ─────────────── GAME STATE FACTORY ───────────────
function mkMech(p){return{
  x:SPAWN_XY[p].x,y:SPAWN_XY[p].y,vx:0,vy:0,
  hp:M_HP,mhp:M_HP,fac:p===0?0:PI,
  dash:false,dT:0,dCD:0,ddx:0,ddy:0,
  parry:false,
  melee:false,mT:0,mCD:0,
  sCD:0,inv:0,
  respT:0,dead:false
}}
function mkGS(){return{
  phase:'countdown',cd:3.5,t:0,win:-1,
  m:[mkMech(0),mkMech(1)],
  c:[{x:CORE_XY[0].x,y:CORE_XY[0].y,hp:C_HP,mhp:C_HP},
     {x:CORE_XY[1].x,y:CORE_XY[1].y,hp:C_HP,mhp:C_HP}],
  en:[E_START,E_START], cn:[0,0],
  bld:[], bul:[], tb:[],
  nd:NODES_DEF.map(n=>({gx:n.gx,gy:n.gy,own:-1})),
  px:[],
  mHit:[false,false]   // melee hit tracker per player
}}

// ─────────────── ENERGY FLOW (BFS) ───────────────
function calcEnergy(g){
  const cn=[0,0];
  for(let p=0;p<2;p++){
    const vis=new Set(), q=[];
    const cc=toG(g.c[p].x,g.c[p].y);
    for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){
      const k=(cc.gx+dx)+','+(cc.gy+dy);
      if(!vis.has(k)){vis.add(k);q.push({gx:cc.gx+dx,gy:cc.gy+dy})}
    }
    const cv=g.bld.filter(b=>b.own===p&&b.tp==='cv');
    let h=0;
    while(h<q.length){
      const{gx,gy}=q[h++];
      for(const b of cv){
        const k=b.gx+','+b.gy;
        if(!vis.has(k)&&Math.abs(b.gx-gx)+Math.abs(b.gy-gy)<=1){
          vis.add(k);q.push({gx:b.gx,gy:b.gy});
        }
      }
    }
    for(const b of g.bld) if(b.own===p&&b.tp==='cv') b.conn=vis.has(b.gx+','+b.gy);
    for(const n of g.nd){
      let aP=false,aE=false;
      for(const b of g.bld){
        if(b.tp!=='cv'||!b.conn)continue;
        if(Math.abs(b.gx-n.gx)+Math.abs(b.gy-n.gy)<=1){
          if(b.own===p)aP=true;else aE=true;
        }
      }
      const oc=toG(g.c[p].x,g.c[p].y);
      if(Math.abs(n.gx-oc.gx)+Math.abs(n.gy-oc.gy)<=2)aP=true;
      const ec=toG(g.c[1-p].x,g.c[1-p].y);
      if(Math.abs(n.gx-ec.gx)+Math.abs(n.gy-ec.gy)<=2)aE=true;
      if(aP&&!aE){n.own=p;cn[p]++}
      else if(!aP&&aE){n.own=1-p;cn[1-p]++}
      else if(aP&&aE) n.own=-1;
    }
  }
  g.cn=cn;
}

// ─────────────── BUILDING LOGIC ───────────────
function canPlace(g,p,gx,gy,tp){
  if(gx<0||gx>=COLS||gy<0||gy>=ROWS)return false;
  for(const b of g.bld)if(b.gx===gx&&b.gy===gy)return false;
  for(const c of g.c){const cc=toG(c.x,c.y);if(Math.abs(gx-cc.gx)<=1&&Math.abs(gy-cc.gy)<=1)return false}
  for(const n of g.nd)if(n.gx===gx&&n.gy===gy)return false;
  const side=(p===0&&gx<20)||(p===1&&gx>=20);
  const adjB=g.bld.some(b=>b.own===p&&Math.abs(b.gx-gx)+Math.abs(b.gy-gy)<=1);
  const cc2=toG(g.c[p].x,g.c[p].y);
  const adjC=Math.abs(gx-cc2.gx)<=2&&Math.abs(gy-cc2.gy)<=2;
  const adjN=g.nd.some(n=>Math.abs(n.gx-gx)+Math.abs(n.gy-gy)<=1);
  if(!side&&!adjB&&!adjC&&!adjN)return false;
  const cost=tp===1?CV_COST:tp===2?WL_COST:TU_COST;
  return g.en[p]>=cost;
}
function doPlace(g,p,gx,gy,tp){
  const cost=tp===1?CV_COST:tp===2?WL_COST:TU_COST;
  g.en[p]-=cost;
  const hp=tp===1?999:tp===2?WL_HP:TU_HP;
  g.bld.push({tp,gx,gy,own:p,hp,mhp:hp,conn:false,fcd:0});
}

// ─────────────── PARTICLES ───────────────
function spPx(g,x,y,c,n){
  for(let i=0;i<n;i++){
    const a=rng(0,TAU),sp=rng(50,220);
    g.px.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:rng(0.15,0.5),ml:0.5,c,r:rng(1.5,4.5)});
  }
}

// ─────────────── AI FOR PRACTICE ───────────────
let aiT=0;
function aiInput(g,p){
  const m=g.m[p],em=g.m[1-p],ec=g.c[1-p];
  const o={w:false,a:false,s:false,d:false,space:false,q:false,mx:ec.x,my:ec.y,lmb:false,rmb:false,bm:0};
  if(m.dead)return o;
  o.mx=em.x+rng(-30,30);o.my=em.y+rng(-30,30);
  const de=Math.hypot(m.x-em.x,m.y-em.y);
  const ae=Math.atan2(em.y-m.y,em.x-m.x);
  if(de>200){if(Math.cos(ae)>0.3)o.d=true;if(Math.cos(ae)<-0.3)o.a=true;if(Math.sin(ae)>0.3)o.s=true;if(Math.sin(ae)<-0.3)o.w=true}
  else if(de<80){if(Math.cos(ae)>0.3)o.a=true;if(Math.cos(ae)<-0.3)o.d=true}
  else{o.w=Math.random()>0.5;o.s=!o.w}
  if(de<350&&m.sCD<=0)o.lmb=true;
  if(de<70&&m.mCD<=0)o.rmb=true;
  if(de>150&&de<300&&m.dCD<=0&&Math.random()<0.02)o.space=true;
  for(const b of g.bul)if(b.own!==p&&Math.hypot(b.x-m.x,b.y-m.y)<100){o.q=true;break}
  for(const b of g.tb)if(b.own!==p&&Math.hypot(b.x-m.x,b.y-m.y)<100){o.q=true;break}
  aiT-=TICK;
  if(aiT<=0){
    aiT=rng(2,5);
    const un=g.nd.filter(n=>n.own!==p);
    if(un.length>0){
      const nd=un[rngI(0,un.length-1)];
      const cc=toG(g.c[p].x,g.c[p].y);
      let cx2=cc.gx,cy2=cc.gy;
      for(let s=0;s<rngI(1,3);s++){
        const dx2=Math.sign(nd.gx-cx2),dy2=Math.sign(nd.gy-cy2);
        Math.abs(nd.gx-cx2)>Math.abs(nd.gy-cy2)?(cx2+=dx2):(cy2+=dy2);
        if(canPlace(g,p,cx2,cy2,1)){doPlace(g,p,cx2,cy2,1);break}
      }
    }
    if(g.en[p]>TU_COST+10&&Math.random()<0.3){
      const cc=toG(g.c[p].x,g.c[p].y);
      for(let t=0;t<10;t++){const gx=cc.gx+rngI(-4,4),gy=cc.gy+rngI(-4,4);if(canPlace(g,p,gx,gy,3)){doPlace(g,p,gx,gy,3);break}}
    }
    if(g.en[p]>WL_COST+10&&Math.random()<0.25){
      const cc=toG(g.c[p].x,g.c[p].y);
      for(let t=0;t<10;t++){const gx=cc.gx+rngI(-5,5),gy=cc.gy+rngI(-5,5);if(canPlace(g,p,gx,gy,2)){doPlace(g,p,gx,gy,2);break}}
    }
  }
  return o;
}

// ─────────────── NETWORKING ───────────────
const STUN_CFG={config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]}};

function doPractice(){
  isHost=true;myIdx=0;practice=true;connState='PLAYING';
  gs=mkGS();
  document.getElementById('menu').style.display='none';
}

function doHost(){
  isHost=true;myIdx=0;practice=false;connState='HOST_WAITING';
  const st=document.getElementById('status');
  st.textContent='Creating room...';
  peer=new Peer(STUN_CFG);
  peer.on('open',id=>{
    document.getElementById('roomId').textContent=id;
    document.getElementById('roomInfo').style.display='block';
    st.textContent='Room created! Share the ID above with your opponent.';
  });
  peer.on('connection',c=>{
    conn=c;connState='CONNECTING';
    st.textContent='Opponent connecting...';
    setupConn();
  });
  peer.on('error',e=>{
    st.textContent='Error: '+e.type;
    connState='MENU';
  });
}

function doJoin(){
  isHost=false;myIdx=1;practice=false;connState='CONNECTING';
  const rid=document.getElementById('ridInput').value.trim();
  const st=document.getElementById('status');
  if(!rid){st.textContent='Please enter a Room ID!';connState='MENU';return}
  st.textContent='Connecting to room...';
  peer=new Peer(STUN_CFG);
  peer.on('open',()=>{
    conn=peer.connect(rid,{reliable:true});
    setupConn();
  });
  peer.on('error',e=>{
    if(e.type==='peer-unavailable'){
      st.textContent='Room not found! Check the ID and try again.';
    }else{
      st.textContent='Connection error: '+e.type;
    }
    connState='MENU';
  });
}

function setupConn(){
  conn.on('open',()=>{
    connState='PLAYING';
    document.getElementById('status').textContent='Connected! Starting game...';
    if(isHost){
      gs=mkGS();
      document.getElementById('menu').style.display='none';
    }
  });
  conn.on('data',d=>{
    if(isHost){
      // Host receives client inputs
      if(d.t==='i') remoteInp=d;
    }else{
      // Client receives game state
      if(d.t==='s'){
        gs=d.s;
        if(gs&&gs.phase!=='menu'){
          const m=document.getElementById('menu');
          if(m.style.display!=='none')m.style.display='none';
          connState='PLAYING';
        }
      }
    }
  });
  conn.on('close',()=>{
    connState='DISCONNECTED';
  });
}

let remoteInp=null;

// ─────────────── GAME UPDATE (HOST ONLY) ───────────────
function update(g,dt){
  // Countdown
  if(g.phase==='countdown'){
    g.cd-=dt;g.t+=dt;at=g.t;
    if(g.cd<=0){g.phase='playing';g.cd=0}
    return;
  }
  if(g.phase==='gameover')return;
  g.t+=dt;at=g.t;

  // Gather inputs for both players
  const inp=[null,null];
  inp[0]=snapInput();
  if(practice){
    inp[1]=aiInput(g,1);
  }else{
    // CRITICAL: Client inputs must be properly routed to Player 1 (index 1)
    if(remoteInp){
      inp[1]={
        w:!!remoteInp.w, a:!!remoteInp.a, s:!!remoteInp.s, d:!!remoteInp.d,
        space:!!remoteInp.space, q:!!remoteInp.q,
        mx:remoteInp.mx, my:remoteInp.my,
        lmb:!!remoteInp.lmb, rmb:!!remoteInp.rmb,
        bm:remoteInp.bm||0
      };
    }
  }

  // Process each player
  for(let p=0;p<2;p++){
    const m=g.m[p], i=inp[p];
    if(!i)continue;

    // Dead → respawn timer
    if(m.dead){
      m.respT-=dt;
      if(m.respT<=0){
        m.dead=false;m.hp=M_HP;
        m.x=CORE_XY[p].x;m.y=CORE_XY[p].y-50;
        m.vx=0;m.vy=0;m.inv=1.5;
      }
      continue;
    }

    // Facing direction (toward mouse cursor)
    m.fac=Math.atan2(i.my-m.y,i.mx-m.x);

    // Parry (hold Q)
    m.parry=i.q&&!m.dash&&!m.melee;

    // Melee (RMB click)
    if(i.rmb&&!m.melee&&m.mCD<=0&&!m.dash&&!m.parry){
      m.melee=true;m.mT=ML_DUR;m.mCD=ML_CD;
      g.mHit[p]=false;
    }
    if(m.melee){m.mT-=dt;if(m.mT<=0)m.melee=false}
    if(m.mCD>0)m.mCD-=dt;

    // Dash (Space)
    if(i.space&&!m.dash&&m.dCD<=0&&!m.melee){
      m.dash=true;m.dT=D_DUR;m.dCD=D_CD;
      m.ddx=Math.cos(m.fac);m.ddy=Math.sin(m.fac);
      m.inv=D_DUR;
    }
    if(m.dash){m.dT-=dt;if(m.dT<=0)m.dash=false}
    if(m.dCD>0)m.dCD-=dt;
    if(m.inv>0)m.inv-=dt;

    // Movement
    if(!m.dash){
      let ax=0,ay=0;
      if(i.w)ay=-1;if(i.s)ay=1;if(i.a)ax=-1;if(i.d)ax=1;
      const ln=Math.hypot(ax,ay);
      if(ln>0){ax/=ln;ay/=ln;m.vx+=ax*M_ACC*dt;m.vy+=ay*M_ACC*dt}
      m.vx*=M_FRIC;m.vy*=M_FRIC;
      const sp=Math.hypot(m.vx,m.vy);
      if(sp>M_SPD){m.vx*=M_SPD/sp;m.vy*=M_SPD/sp}
    }else{
      m.vx=m.ddx*D_SPD;m.vy=m.ddy*D_SPD;
    }
    if(m.parry){m.vx*=0.65;m.vy*=0.65}

    m.x+=m.vx*dt;m.y+=m.vy*dt;
    m.x=clamp(m.x,MR,W-MR);m.y=clamp(m.y,MR,H-MR);

    // Shooting (LMB, no build mode active)
    if(m.sCD>0)m.sCD-=dt;
    if(i.lmb&&!m.dash&&!m.parry&&i.bm===0&&m.sCD<=0){
      if(g.en[p]>=B_COST){
        g.en[p]-=B_COST;m.sCD=B_CD;
        const bx=m.x+Math.cos(m.fac)*22,by=m.y+Math.sin(m.fac)*22;
        g.bul.push({x:bx,y:by,vx:Math.cos(m.fac)*B_SPD,vy:Math.sin(m.fac)*B_SPD,
          own:p,dmg:B_DMG,ref:false,life:B_LIFE});
      }
    }

    // Building placement (LMB click with build mode)
    if(i.lmb&&i.bm>0){
      const gx=Math.floor(i.mx/CELL),gy=Math.floor(i.my/CELL);
      if(gx>=0&&gx<COLS&&gy>=0&&gy<ROWS){
        if(canPlace(g,p,gx,gy,i.bm)){
          doPlace(g,p,gx,gy,i.bm);
        }
      }
    }
  }

  // ──── COLLISIONS ────
  // Mech vs wall/turret
  for(let p=0;p<2;p++){
    const m=g.m[p];if(m.dead)continue;
    for(const b of g.bld){
      if(b.tp==='cv')continue;
      const bc=gCtr(b.gx,b.gy);
      if(rCirc(bc.x-CELL/2,bc.y-CELL/2,CELL,CELL,m.x,m.y,MR)){
        const cx2=clamp(m.x,bc.x-CELL/2,bc.x+CELL/2);
        const cy2=clamp(m.y,bc.y-CELL/2,bc.y+CELL/2);
        const dx=m.x-cx2,dy=m.y-cy2,d=Math.hypot(dx,dy)||0.01;
        const ov=MR-d;if(ov>0){m.x+=dx/d*ov;m.y+=dy/d*ov}
      }
    }
    // Core collision
    for(const c of g.c){
      if(rCirc(c.x-C_SZ/2,c.y-C_SZ/2,C_SZ,C_SZ,m.x,m.y,MR)){
        const cx2=clamp(m.x,c.x-C_SZ/2,c.x+C_SZ/2);
        const cy2=clamp(m.y,c.y-C_SZ/2,c.y+C_SZ/2);
        const dx=m.x-cx2,dy=m.y-cy2,d=Math.hypot(dx,dy)||0.01;
        const ov=MR-d;if(ov>0){m.x+=dx/d*ov;m.y+=dy/d*ov}
      }
    }
  }

  // Mech vs mech
  {
    const m0=g.m[0],m1=g.m[1];
    if(!m0.dead&&!m1.dead){
      const dx=m1.x-m0.x,dy=m1.y-m0.y,d=Math.hypot(dx,dy)||0.01;
      const ov=MR*2-d;
      if(ov>0){
        const nx=dx/d,ny=dy/d;
        m0.x-=nx*ov/2;m0.y-=ny*ov/2;
        m1.x+=nx*ov/2;m1.y+=ny*ov/2;
        const rv=m0.vx-m1.vx,rw=m0.vy-m1.vy;
        const dot=rv*nx+rw*ny;
        if(dot>0){m0.vx-=dot*nx*0.5;m0.vy-=dot*ny*0.5;m1.vx+=dot*nx*0.5;m1.vy+=dot*ny*0.5}
      }
      if(d<MR*2+8){
        if(m0.dash&&m1.inv<=0){m1.hp-=D_DMG;m1.vx+=m0.ddx*280;m1.vy+=m0.ddy*280;spPx(g,m1.x,m1.y,'#0ff',6)}
        if(m1.dash&&m0.inv<=0){m0.hp-=D_DMG;m0.vx+=m1.ddx*280;m0.vy+=m1.ddy*280;spPx(g,m0.x,m0.y,'#f60',6)}
      }
    }
  }

  // Melee hitbox
  for(let p=0;p<2;p++){
    const m=g.m[p];
    if(!m.melee||m.dead)continue;
    const prog=1-m.mT/ML_DUR;
    if(prog<0.2||prog>0.75)continue;
    const hx=m.x+Math.cos(m.fac)*ML_RNG,hy=m.y+Math.sin(m.fac)*ML_RNG;
    const ep=1-p;const em=g.m[ep];
    // Melee vs mech
    if(!em.dead&&!g.mHit[p]&&Math.hypot(hx-em.x,hy-em.y)<MR+ML_HW){
      if(em.inv<=0){
        em.hp-=ML_DMG_M;
        em.vx+=Math.cos(m.fac)*ML_KB;em.vy+=Math.sin(m.fac)*ML_KB;
        g.mHit[p]=true;spPx(g,em.x,em.y,'#ff0',10);
      }
    }
    // Melee vs buildings (instant destroy)
    for(let bi=g.bld.length-1;bi>=0;bi--){
      const b=g.bld[bi];if(b.own===p)continue;
      const bc=gCtr(b.gx,b.gy);
      if(Math.hypot(hx-bc.x,hy-bc.y)<CELL*0.7+ML_HW){b.hp=0;spPx(g,bc.x,bc.y,'#fa0',8)}
    }
    // Melee vs core
    const eco=g.c[ep];
    if(Math.hypot(hx-eco.x,hy-eco.y)<C_SZ/2+ML_HW){eco.hp-=ML_DMG_M*0.4;spPx(g,eco.x,eco.y,'#f00',5)}
  }

  // ──── BULLET UPDATE ────
  for(let bi=g.bul.length-1;bi>=0;bi--){
    const b=g.bul[bi];
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
    if(b.life<=0||b.x<-20||b.x>W+20||b.y<-20||b.y>H+20){g.bul.splice(bi,1);continue}
    let hit=false;

    // vs mechs
    for(let p=0;p<2;p++){
      if(p===b.own&&!b.ref)continue;
      const m=g.m[p];if(m.dead||m.inv>0)continue;
      // Parry check — CRITICAL: uses proper arc math
      if(m.parry){
        if(ptInArc(b.x,b.y,m.x,m.y,m.fac,PA_ARC/2,PA_DIST)){
          const sp=Math.hypot(b.vx,b.vy)*1.35;
          const ra=Math.atan2(-b.vy,-b.vx)+rng(-0.15,0.15);
          b.vx=Math.cos(ra)*sp;b.vy=Math.sin(ra)*sp;
          b.own=p;b.ref=true;b.dmg=Math.ceil(b.dmg*1.5);
          spPx(g,b.x,b.y,'#fff',5);
          continue; // reflected, don't process hit
        }
      }
      if(cCirc(b.x,b.y,5,m.x,m.y,MR)){
        m.hp-=b.dmg;spPx(g,b.x,b.y,b.ref?'#fff':'#f80',4);hit=true;break;
      }
    }
    if(hit){g.bul.splice(bi,1);continue}

    // vs buildings
    for(let bbi=g.bld.length-1;bbi>=0;bbi--){
      const bl=g.bld[bbi];
      if(bl.own===b.own&&!b.ref)continue;
      const bc=gCtr(bl.gx,bl.gy);
      if(rCirc(bc.x-CELL/2,bc.y-CELL/2,CELL,CELL,b.x,b.y,5)){
        bl.hp-=b.dmg;spPx(g,b.x,b.y,'#fa0',3);hit=true;break;
      }
    }
    if(hit){g.bul.splice(bi,1);continue}

    // vs cores
    for(let p=0;p<2;p++){
      if(p===b.own&&!b.ref)continue;
      const c=g.c[p];
      if(rCirc(c.x-C_SZ/2,c.y-C_SZ/2,C_SZ,C_SZ,b.x,b.y,5)){
        c.hp-=b.dmg;spPx(g,b.x,b.y,'#f44',4);hit=true;break;
      }
    }
    if(hit){g.bul.splice(bi,1);continue}

    // vs enemy walls (block)
    for(const bl of g.bld){
      if(bl.tp==='wl'&&bl.own!==b.own){
        const bc=gCtr(bl.gx,bl.gy);
        if(rCirc(bc.x-CELL/2,bc.y-CELL/2,CELL,CELL,b.x,b.y,5)){hit=true;break}
      }
    }
    if(hit)g.bul.splice(bi,1);
  }

  // Remove dead buildings
  g.bld=g.bld.filter(b=>b.hp>0);

  // ──── TURRET AI ────
  for(const b of g.bld){
    if(b.tp!=='tu')continue;
    if(b.fcd===undefined)b.fcd=0;
    if(b.fcd>0){b.fcd-=dt;continue}
    const bc=gCtr(b.gx,b.gy);
    const ep=1-b.own;const em=g.m[ep];
    let tgt=null,md=TU_RNG;
    if(!em.dead){const d1=Math.hypot(bc.x-em.x,bc.y-em.y);if(d1<md){md=d1;tgt={x:em.x,y:em.y}}}
    const eco=g.c[ep];const d2=Math.hypot(bc.x-eco.x,bc.y-eco.y);
    if(d2<md){md=d2;tgt={x:eco.x,y:eco.y}}
    if(tgt&&g.en[b.own]>=TU_ECOST){
      g.en[b.own]-=TU_ECOST;b.fcd=TU_RATE;
      const ang=Math.atan2(tgt.y-bc.y,tgt.x-bc.x);
      g.tb.push({x:bc.x,y:bc.y,vx:Math.cos(ang)*B_SPD*0.85,vy:Math.sin(ang)*B_SPD*0.85,
        own:b.own,dmg:TU_DMG,life:1.4,ref:false});
    }
  }

  // Turret bullets
  for(let bi=g.tb.length-1;bi>=0;bi--){
    const b=g.tb[bi];
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
    if(b.life<=0||b.x<-20||b.x>W+20||b.y<-20||b.y>H+20){g.tb.splice(bi,1);continue}
    let hit=false;
    const ep=1-b.own;const em=g.m[ep];
    if(!em.dead&&em.inv<=0&&cCirc(b.x,b.y,4,em.x,em.y,MR)){
      em.hp-=b.dmg;hit=true;spPx(g,b.x,b.y,'#fa0',4);
    }
    if(!hit)for(const bl of g.bld){
      if(bl.tp==='wl'&&bl.own!==b.own){
        const bc=gCtr(bl.gx,bl.gy);
        if(rCirc(bc.x-CELL/2,bc.y-CELL/2,CELL,CELL,b.x,b.y,4)){hit=true;break}
      }
    }
    if(hit)g.tb.splice(bi,1);
  }

  // ──── ENERGY ────
  calcEnergy(g);
  for(let p=0;p<2;p++) g.en[p]=Math.min(E_MAX,g.en[p]+g.cn[p]*E_RATE*dt);

  // ──── PARTICLES ────
  for(let pi=g.px.length-1;pi>=0;pi--){
    const p2=g.px[pi];p2.x+=p2.vx*dt;p2.y+=p2.vy*dt;p2.life-=dt;
    if(p2.life<=0)g.px.splice(pi,1);
  }

  // ──── DEATH / WIN ────
  for(let p=0;p<2;p++){
    const m=g.m[p];
    if(m.hp<=0&&!m.dead){m.dead=true;m.hp=0;m.respT=3;spPx(g,m.x,m.y,p===0?PC[0]:EC[0],15)}
    if(g.c[p].hp<=0){g.phase='gameover';g.win=1-p}
  }
}

// ─────────────── RENDERING ───────────────
function render(g){
  // BG
  cx.fillStyle='#080818';cx.fillRect(0,0,W,H);

  // Grid
  cx.strokeStyle='#12122a';cx.lineWidth=0.5;
  for(let x=0;x<=W;x+=CELL){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke()}
  for(let y=0;y<=H;y+=CELL){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke()}

  // Territory tint
  cx.fillStyle='rgba(0,60,80,0.04)';cx.fillRect(0,0,W/2,H);
  cx.fillStyle='rgba(80,40,0,0.04)';cx.fillRect(W/2,0,W/2,H);
  // Divider
  cx.strokeStyle='rgba(255,255,255,0.12)';cx.lineWidth=2;cx.setLineDash([10,10]);
  cx.beginPath();cx.moveTo(W/2,0);cx.lineTo(W/2,H);cx.stroke();cx.setLineDash([]);

  // ──── CONVEYORS ────
  for(const b of g.bld){
    if(b.tp!=='cv')continue;
    const bc=gCtr(b.gx,b.gy);
    const dim=b.own===0?PD[0]:ED[0];
    const br=b.own===0?PC[0]:EC[0];
    cx.fillStyle=b.conn?dim:'#0a0a12';
    cx.fillRect(bc.x-CELL/2+2,bc.y-CELL/2+2,CELL-4,CELL-4);
    cx.strokeStyle=b.conn?br:'#222';cx.lineWidth=1;
    cx.strokeRect(bc.x-CELL/2+2,bc.y-CELL/2+2,CELL-4,CELL-4);
    if(b.conn){
      cx.save();cx.translate(bc.x,bc.y);
      const co=g.c[b.own];
      const ang=Math.atan2(co.y-bc.y,co.x-bc.x);
      cx.rotate(Math.round(ang/(PI/2))*(PI/2));
      const off=(at*90)%24;
      cx.fillStyle=br;cx.globalAlpha=0.6;
      for(let i=-1;i<=1;i++){
        const ox=-12+i*24+off;
        cx.beginPath();cx.moveTo(ox-5,-5);cx.lineTo(ox+5,0);cx.lineTo(ox-5,5);cx.fill();
      }
      cx.globalAlpha=1;cx.restore();
    }
  }

  // ──── WALLS ────
  for(const b of g.bld){
    if(b.tp!=='wl')continue;
    const bc=gCtr(b.gx,b.gy);
    const fill=b.own===0?PBL[0]:EBL[0];
    const bdr=b.own===0?PC[0]:EC[0];
    cx.fillStyle=fill;
    cx.fillRect(bc.x-CELL/2+1,bc.y-CELL/2+1,CELL-2,CELL-2);
    // Cross pattern
    cx.strokeStyle=bdr;cx.lineWidth=1;cx.globalAlpha=0.3;
    cx.beginPath();cx.moveTo(bc.x-CELL/2+1,bc.y-CELL/2+1);cx.lineTo(bc.x+CELL/2-1,bc.y+CELL/2-1);cx.stroke();
    cx.beginPath();cx.moveTo(bc.x+CELL/2-1,bc.y-CELL/2+1);cx.lineTo(bc.x-CELL/2+1,bc.y+CELL/2-1);cx.stroke();
    cx.globalAlpha=1;
    cx.strokeStyle=bdr;cx.lineWidth=2;
    cx.strokeRect(bc.x-CELL/2+1,bc.y-CELL/2+1,CELL-2,CELL-2);
    if(b.hp<b.mhp){
      const pct=b.hp/b.mhp;
      cx.fillStyle='#300';cx.fillRect(bc.x-CELL/2,bc.y-CELL/2-7,CELL,4);
      cx.fillStyle='#0c0';cx.fillRect(bc.x-CELL/2,bc.y-CELL/2-7,CELL*pct,4);
    }
  }

  // ──── TURRETS ────
  for(const b of g.bld){
    if(b.tp!=='tu')continue;
    const bc=gCtr(b.gx,b.gy);
    const col=b.own===0?PC[0]:EC[0];
    const bg=b.own===0?PBG[0]:EBG[0];
    // Range circle
    cx.strokeStyle=col;cx.lineWidth=0.5;cx.globalAlpha=0.1;
    cx.beginPath();cx.arc(bc.x,bc.y,TU_RNG,0,TAU);cx.stroke();cx.globalAlpha=1;
    // Base
    cx.fillStyle=bg;cx.fillRect(bc.x-15,bc.y-15,30,30);
    cx.strokeStyle=col;cx.lineWidth=2;cx.strokeRect(bc.x-15,bc.y-15,30,30);
    // Inner diamond
    cx.fillStyle=col;cx.globalAlpha=0.3;
    cx.beginPath();cx.moveTo(bc.x,bc.y-8);cx.lineTo(bc.x+8,bc.y);cx.lineTo(bc.x,bc.y+8);cx.lineTo(bc.x-8,bc.y);cx.closePath();cx.fill();cx.globalAlpha=1;
    // Gun barrel
    const ep=1-b.own;const em=g.m[ep];
    const aim=Math.atan2(em.y-bc.y,em.x-bc.x);
    cx.strokeStyle=col;cx.lineWidth=4;cx.lineCap='round';
    cx.beginPath();cx.moveTo(bc.x,bc.y);cx.lineTo(bc.x+Math.cos(aim)*20,bc.y+Math.sin(aim)*20);cx.stroke();
    cx.lineCap='butt';
    if(b.hp<b.mhp){
      const pct=b.hp/b.mhp;
      cx.fillStyle='#300';cx.fillRect(bc.x-CELL/2,bc.y-CELL/2-7,CELL,4);
      cx.fillStyle='#0c0';cx.fillRect(bc.x-CELL/2,bc.y-CELL/2-7,CELL*pct,4);
    }
  }

  // ──── RESOURCE NODES ────
  for(const n of g.nd){
    const nc=gCtr(n.gx,n.gy);
    const col=n.own===0?PC[0]:n.own===1?EC[0]:'#666';
    const glow=n.own===0?PG[0]:n.own===1?EG[0]:'rgba(100,100,100,0.15)';
    const pulse=1+Math.sin(at*2.5)*0.15;
    cx.fillStyle=glow;cx.beginPath();cx.arc(nc.x,nc.y,28*pulse,0,TAU);cx.fill();
    cx.fillStyle=n.own>=0?(n.own===0?'#0a2a2a':'#2a1a0a'):'#1a1a1a';
    cx.strokeStyle=col;cx.lineWidth=2;
    cx.beginPath();
    for(let i=0;i<6;i++){const a=PI/3*i-PI/6;const px=nc.x+18*Math.cos(a),py=nc.y+18*Math.sin(a);i===0?cx.moveTo(px,py):cx.lineTo(px,py)}
    cx.closePath();cx.fill();cx.stroke();
    cx.fillStyle=col;cx.font='bold 13px monospace';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText('E',nc.x,nc.y+1);
    if(n.own>=0){cx.font='9px monospace';cx.fillText('P'+(n.own+1),nc.x,nc.y+22)}
  }

  // ──── CORES ────
  for(let p=0;p<2;p++){
    const c=g.c[p];
    const col=p===0?PC[0]:EC[0];
    const glow=p===0?PG[0]:EG[0];
    const bg=p===0?PBG[0]:EBG[0];
    cx.fillStyle=glow;cx.fillRect(c.x-C_SZ/2-12,c.y-C_SZ/2-12,C_SZ+24,C_SZ+24);
    const pls=Math.sin(at*3)*3;const hs=C_SZ/2+pls/2;
    cx.fillStyle=bg;cx.fillRect(c.x-hs,c.y-hs,hs*2,hs*2);
    cx.strokeStyle=col;cx.lineWidth=3;cx.strokeRect(c.x-hs,c.y-hs,hs*2,hs*2);
    cx.fillStyle=col;cx.globalAlpha=0.25+Math.sin(at*4)*0.1;
    cx.fillRect(c.x-16,c.y-16,32,32);cx.globalAlpha=1;
    cx.strokeStyle=col;cx.lineWidth=1;cx.globalAlpha=0.4;
    cx.beginPath();cx.moveTo(c.x-20,c.y);cx.lineTo(c.x+20,c.y);cx.stroke();
    cx.beginPath();cx.moveTo(c.x,c.y-20);cx.lineTo(c.x,c.y+20);cx.stroke();cx.globalAlpha=1;
    const pct=c.hp/c.mhp;
    cx.fillStyle='#300';cx.fillRect(c.x-C_SZ/2,c.y-C_SZ/2-14,C_SZ,8);
    cx.fillStyle=pct>0.5?'#0c0':pct>0.25?'#cc0':'#c00';
    cx.fillRect(c.x-C_SZ/2,c.y-C_SZ/2-14,C_SZ*pct,8);
    cx.strokeStyle='#555';cx.lineWidth=1;cx.strokeRect(c.x-C_SZ/2,c.y-C_SZ/2-14,C_SZ,8);
    cx.fillStyle=col;cx.font='bold 11px monospace';cx.textAlign='center';
    cx.fillText(p===0?'P1 CORE':'P2 CORE',c.x,c.y+C_SZ/2+18);
  }

  // ──── BULLETS ────
  for(const b of g.bul){
    const col=b.own===0?PC[0]:EC[0];
    cx.strokeStyle=b.ref?'#fff':col;cx.lineWidth=2;cx.globalAlpha=0.35;
    cx.beginPath();cx.moveTo(b.x,b.y);cx.lineTo(b.x-b.vx*0.025,b.y-b.vy*0.025);cx.stroke();cx.globalAlpha=1;
    cx.fillStyle=b.ref?'#fff':col;
    cx.beginPath();cx.arc(b.x,b.y,b.ref?5:3.5,0,TAU);cx.fill();
    if(b.ref){cx.strokeStyle='#fff';cx.lineWidth=1;cx.globalAlpha=0.5;cx.beginPath();cx.arc(b.x,b.y,7,0,TAU);cx.stroke();cx.globalAlpha=1}
  }
  for(const b of g.tb){
    cx.fillStyle=b.own===0?PC[0]:EC[0];
    cx.beginPath();cx.arc(b.x,b.y,3,0,TAU);cx.fill();
  }

  // ──── MECHS ────
  for(let p=0;p<2;p++){
    const m=g.m[p];
    if(m.dead){
      cx.fillStyle=p===0?PC[0]:EC[0];cx.globalAlpha=0.5;
      cx.font='12px monospace';cx.textAlign='center';
      cx.fillText('RESPAWN '+Math.ceil(m.respT)+'s',m.x,m.y);cx.globalAlpha=1;
      continue;
    }
    const col=p===0?PC[0]:EC[0];
    const bg=p===0?PBG[0]:EBG[0];
    cx.save();cx.translate(m.x,m.y);cx.rotate(m.fac);
    if(m.inv>0&&Math.floor(m.inv*12)%2===0)cx.globalAlpha=0.4;
    if(m.dash){
      cx.fillStyle=p===0?'rgba(0,255,255,0.15)':'rgba(255,100,0,0.15)';
      cx.beginPath();cx.arc(0,0,MR+12,0,TAU);cx.fill();
      cx.strokeStyle=col;cx.lineWidth=1;cx.globalAlpha=0.4;
      for(let i=0;i<3;i++){const oy=(i-1)*8;cx.beginPath();cx.moveTo(-MR-15,oy);cx.lineTo(-MR-5-rng(0,10),oy);cx.stroke()}
      cx.globalAlpha=m.inv>0&&Math.floor(m.inv*12)%2===0?0.4:1;
    }
    if(m.parry){
      cx.strokeStyle='#fff';cx.lineWidth=3;cx.globalAlpha=0.6;
      cx.beginPath();cx.arc(0,0,MR+14,-PA_ARC/2,PA_ARC/2);cx.stroke();
      cx.fillStyle='rgba(200,200,255,0.12)';cx.beginPath();cx.moveTo(0,0);
      cx.arc(0,0,MR+14,-PA_ARC/2,PA_ARC/2);cx.closePath();cx.fill();
      cx.globalAlpha=m.inv>0&&Math.floor(m.inv*12)%2===0?0.4:1;
    }
    cx.fillStyle=bg;cx.strokeStyle=col;cx.lineWidth=2;
    cx.beginPath();cx.moveTo(MR+5,0);cx.lineTo(-MR+2,-MR+2);cx.lineTo(-MR+8,0);cx.lineTo(-MR+2,MR-2);cx.closePath();cx.fill();cx.stroke();
    cx.fillStyle=col;cx.globalAlpha*=0.5;cx.beginPath();cx.arc(-MR+5,0,4,0,TAU);cx.fill();
    cx.globalAlpha=m.inv>0&&Math.floor(m.inv*12)%2===0?0.4:1;
    if(m.melee){
      const prog=1-m.mT/ML_DUR;
      const ext=prog<0.45?prog/0.45*ML_RNG:(1-prog)/0.55*ML_RNG;
      cx.fillStyle='#ff0';cx.globalAlpha*=0.85;cx.fillRect(MR,-5,ext,10);
      cx.fillStyle='#fff';cx.fillRect(MR+ext-4,-6,8,12);
      cx.globalAlpha=m.inv>0&&Math.floor(m.inv*12)%2===0?0.4:1;
    }else{
      cx.strokeStyle=col;cx.lineWidth=2.5;
      cx.beginPath();cx.moveTo(MR,-4);cx.lineTo(MR+10,-4);cx.stroke();
      cx.beginPath();cx.moveTo(MR,4);cx.lineTo(MR+10,4);cx.stroke();
      if(m.sCD>B_CD*0.7){cx.fillStyle='#fff';cx.globalAlpha*=0.7;cx.beginPath();cx.arc(MR+12,0,5,0,TAU);cx.fill();cx.globalAlpha=m.inv>0&&Math.floor(m.inv*12)%2===0?0.4:1}
    }
    cx.globalAlpha=1;cx.restore();
    // HP bar
    const bw=42,bh=5,bx2=m.x-bw/2,by2=m.y-MR-16;
    cx.fillStyle='#300';cx.fillRect(bx2,by2,bw,bh);
    cx.fillStyle=m.hp>60?'#0c0':m.hp>30?'#cc0':'#c00';
    cx.fillRect(bx2,by2,bw*(m.hp/m.mhp),bh);
    cx.strokeStyle='#555';cx.lineWidth=0.5;cx.strokeRect(bx2,by2,bw,bh);
    cx.fillStyle=col;cx.font='9px monospace';cx.textAlign='center';
    cx.fillText('P'+(p+1),m.x,m.y-MR-20);
  }

  // ──── PARTICLES ────
  for(const p2 of g.px){
    const a=clamp(p2.life/p2.ml,0,1);
    cx.fillStyle=p2.c;cx.globalAlpha=a;
    cx.beginPath();cx.arc(p2.x,p2.y,p2.r*a,0,TAU);cx.fill();
  }
  cx.globalAlpha=1;

  // ──── BUILD MODE GHOST PREVIEW ────
  if(bMode>0&&g.phase==='playing'){
    const gx=Math.floor(mx/CELL),gy=Math.floor(my/CELL);
    if(gx>=0&&gx<COLS&&gy>=0&&gy<ROWS){
      const bc=gCtr(gx,gy);
      const ok=canPlace(g,myIdx,gx,gy,bMode);
      // Ghost preview of the building
      if(bMode===1){
        // Conveyor preview
        cx.fillStyle=ok?'rgba(0,255,255,0.2)':'rgba(255,0,0,0.15)';
        cx.fillRect(bc.x-CELL/2+2,bc.y-CELL/2+2,CELL-4,CELL-4);
      }else if(bMode===2){
        // Wall preview
        cx.fillStyle=ok?'rgba(100,200,100,0.25)':'rgba(255,50,50,0.2)';
        cx.fillRect(bc.x-CELL/2+1,bc.y-CELL/2+1,CELL-2,CELL-2);
      }else if(bMode===3){
        // Turret preview
        cx.fillStyle=ok?'rgba(100,200,100,0.2)':'rgba(255,50,50,0.15)';
        cx.beginPath();cx.arc(bc.x,bc.y,15,0,TAU);cx.fill();
        // Range circle preview
        cx.strokeStyle=ok?'rgba(0,255,0,0.15)':'rgba(255,0,0,0.1)';
        cx.lineWidth=1;cx.beginPath();cx.arc(bc.x,bc.y,TU_RNG,0,TAU);cx.stroke();
      }
      // Grid outline
      cx.strokeStyle=ok?'#0f0':'#f00';cx.lineWidth=2;
      cx.strokeRect(bc.x-CELL/2,bc.y-CELL/2,CELL,CELL);
      // Type icon
      cx.fillStyle=ok?'#0f0':'#f44';cx.font='bold 16px monospace';cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(bMode===1?'>':bMode===2?'#':'T',bc.x,bc.y);
    }
  }

  // ──── HUD ────
  drawHUD(g);

  // ──── CONNECTION STATUS ────
  drawConnStatus();
}

function drawHUD(g){
  if(!g)return;
  const p=myIdx;

  if(g.phase==='countdown'){
    cx.fillStyle='rgba(0,0,0,0.55)';cx.fillRect(0,0,W,H);
    const num=Math.ceil(g.cd);
    cx.fillStyle=num>0?'#0ff':'#0f0';
    cx.font='bold 100px monospace';cx.textAlign='center';cx.textBaseline='middle';
    cx.shadowColor=cx.fillStyle;cx.shadowBlur=30;
    cx.fillText(num>0?''+num:'GO!',W/2,H/2);cx.shadowBlur=0;
    cx.font='22px monospace';cx.fillStyle='#aaa';cx.fillText('GET READY!',W/2,H/2+70);
    if(practice){cx.fillStyle='#0f0';cx.font='16px monospace';cx.fillText('[ SOLO PRACTICE ]',W/2,H/2+100)}
    return;
  }
  if(g.phase==='gameover'){
    cx.fillStyle='rgba(0,0,0,0.65)';cx.fillRect(0,0,W,H);
    const wc=g.win===0?PC[0]:EC[0];
    cx.fillStyle=wc;cx.font='bold 56px monospace';cx.textAlign='center';cx.textBaseline='middle';
    cx.shadowColor=wc;cx.shadowBlur=20;
    cx.fillText(practice&&g.win===1?'AI WINS!':'PLAYER '+(g.win+1)+' WINS!',W/2,H/2);
    cx.shadowBlur=0;cx.font='20px monospace';cx.fillStyle='#888';
    cx.fillText('Refresh page to play again',W/2,H/2+55);
    return;
  }

  const m=g.m[p],e=g.en[p],cn=g.cn[p],col=p===0?PC[0]:EC[0];
  // Player info panel
  cx.fillStyle='rgba(0,0,0,0.55)';cx.fillRect(10,10,240,108);
  cx.strokeStyle=col;cx.lineWidth=1.5;cx.strokeRect(10,10,240,108);
  cx.font='bold 12px monospace';cx.textAlign='left';cx.textBaseline='top';
  cx.fillStyle='#aaa';cx.fillText('MECH',20,16);
  cx.fillStyle='#300';cx.fillRect(70,16,170,12);
  cx.fillStyle=m.hp>60?'#0c0':m.hp>30?'#cc0':'#c00';
  cx.fillRect(70,16,170*(Math.max(0,m.hp)/m.mhp),12);
  cx.fillStyle='#fff';cx.font='9px monospace';cx.fillText(Math.ceil(Math.max(0,m.hp))+'/'+m.mhp,72,17);
  cx.font='bold 12px monospace';cx.fillStyle='#aaa';cx.fillText('NRG',20,34);
  cx.fillStyle='#003';cx.fillRect(70,34,170,12);
  cx.fillStyle='#08f';cx.fillRect(70,34,170*(e/E_MAX),12);
  cx.fillStyle='#fff';cx.font='9px monospace';cx.fillText(Math.floor(e)+'/'+E_MAX,72,35);
  cx.font='bold 12px monospace';cx.fillStyle='#aaa';cx.fillText('NODES',20,52);
  cx.fillStyle='#cc0';cx.fillText(cn+'/'+NODES_DEF.length,80,52);
  cx.fillStyle='#888';cx.font='11px monospace';
  cx.fillText('Core: '+Math.ceil(Math.max(0,g.c[p].hp))+'/'+C_HP,20,72);
  const dR=m.dCD<=0;cx.fillStyle=dR?'#0f0':'#555';cx.fillText('Dash: '+(dR?'READY':m.dCD.toFixed(1)+'s'),20,88);
  const mR=m.mCD<=0;cx.fillStyle=mR?'#0f0':'#555';cx.fillText('Melee: '+(mR?'READY':m.mCD.toFixed(1)+'s'),120,88);

  // Build mode indicator
  if(bMode>0){
    const bn=bMode===1?'CONVEYOR':bMode===2?'WALL':'TURRET';
    const bc2=bMode===1?CV_COST:bMode===2?WL_COST:TU_COST;
    const af=e>=bc2;
    cx.fillStyle='rgba(0,0,0,0.65)';cx.fillRect(W/2-110,H-48,220,38);
    cx.strokeStyle=af?'#0f0':'#f00';cx.lineWidth=2;cx.strokeRect(W/2-110,H-48,220,38);
    cx.fillStyle=af?'#0f0':'#f44';cx.font='bold 14px monospace';cx.textAlign='center';
    cx.fillText('Placing: '+bn+' (-'+bc2+'E)',W/2,H-24);
  }

  // Hotkey guide
  cx.fillStyle='rgba(0,0,0,0.45)';cx.fillRect(10,H-95,260,85);
  cx.fillStyle='#666';cx.font='10px monospace';cx.textAlign='left';
  const y0=H-85;
  cx.fillText('[1] Conveyor (-'+CV_COST+'E)  [2] Wall (-'+WL_COST+'E)',20,y0);
  cx.fillText('[3] Turret (-'+TU_COST+'E)  [Esc] Cancel',20,y0+14);
  cx.fillText('[Q] Parry Shield  [Space] Dash',20,y0+28);
  cx.fillText('[LMB] Shoot  [RMB] Piledriver Melee',20,y0+42);
  cx.fillText('Connect Nodes to Core via Conveyors!',20,y0+58);

  // Enemy info
  const ep=1-p,em=g.m[ep],eco=g.c[ep];
  cx.fillStyle='rgba(0,0,0,0.55)';cx.fillRect(W-240,10,230,75);
  cx.strokeStyle=ep===0?PC[0]:EC[0];cx.lineWidth=1.5;cx.strokeRect(W-240,10,230,75);
  cx.font='bold 12px monospace';cx.textAlign='left';cx.fillStyle='#aaa';
  cx.fillText('ENEMY',W-230,16);
  cx.fillStyle='#300';cx.fillRect(W-170,16,150,12);
  cx.fillStyle=em.hp>60?'#0c0':em.hp>30?'#cc0':'#c00';
  cx.fillRect(W-170,16,150*(Math.max(0,em.hp)/em.mhp),12);
  cx.fillStyle='#888';cx.font='10px monospace';
  cx.fillText('Core: '+Math.ceil(Math.max(0,eco.hp))+'/'+C_HP+'  Nodes: '+g.cn[ep]+'  NRG: '+Math.floor(g.en[ep]),W-230,38);
  cx.fillText(em.dead?'RESPAWNING...':'ACTIVE',W-230,54);

  if(practice){cx.fillStyle='#0f0';cx.font='bold 11px monospace';cx.textAlign='center';cx.fillText('[ SOLO PRACTICE ]',W/2,18)}
}

function drawConnStatus(){
  // Connection status badge on canvas
  const labels={MENU:'MENU',HOST_WAITING:'HOST - WAITING',CONNECTING:'CONNECTING...',PLAYING:isHost?'HOST':'CLIENT',DISCONNECTED:'DISCONNECTED'};
  const colors={MENU:'#888',HOST_WAITING:'#ff0',CONNECTING:'#ff0',PLAYING:'#0f0',DISCONNECTED:'#f00'};
  const lbl=labels[connState]||'UNKNOWN';
  const col=colors[connState]||'#888';
  cx.fillStyle='rgba(0,0,0,0.5)';
  cx.fillRect(W/2-70,H-20,140,18);
  cx.fillStyle=col;cx.font='bold 10px monospace';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(connState==='PLAYING'?(isHost?'[ HOST ]':'[ CLIENT ]'):'[ '+lbl+' ]',W/2,H-11);
}

// ─────────────── GAME LOOP ───────────────
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lt)/1000,0.1);
  lt=ts;

  if(!gs){cx.fillStyle='#080818';cx.fillRect(0,0,W,H);return}

  if(isHost||practice){
    acc+=dt;let ticks=0;
    while(acc>=TICK&&ticks<3){update(gs,TICK);acc-=TICK;ticks++}
    render(gs);
    if(!practice&&conn&&conn.open){
      try{conn.send({t:'s',s:gs})}catch(e){}
    }
  }else{
    // Client: send input, render received state
    if(conn&&conn.open){
      try{
        const inp=snapInput();
        conn.send({t:'i',...inp});
      }catch(e){}
    }
    if(gs){
      at=gs.t||0;
      render(gs);
    }
  }
}

lt=performance.now();
requestAnimationFrame(loop);
</script>
